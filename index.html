<body>
<div id="root"></div>
<script type="text/babel" data-presets="react,env">
const {useState, useEffect, useRef, useCallback, createContext, useContext} = React;

// ====================================================
// CHANGE THIS TO YOUR RENDER BACKEND URL!
// ====================================================
const BACKEND = "https://exam-made-easy-gce-online-tuitions.onrender.com";
// ====================================================

const api = async (method, path, body, token, formData) => {
  const opts = { method, headers: {} };
  if (token) opts.headers['Authorization'] = `Bearer ${token}`;
  if (body && !formData) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  else if (formData) opts.body = formData;
  const r = await fetch(`${BACKEND}/api${path}`, opts);
  const d = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(d.error || `Error ${r.status}`);
  return d;
};

const SUBJECTS = [
  {id:1,name:"Mathematics",icon:"📐"},{id:2,name:"English Language",icon:"📖"},
  {id:3,name:"Biology",icon:"🌿"},{id:4,name:"Chemistry",icon:"⚗️"},
  {id:5,name:"Physics",icon:"⚡"},{id:6,name:"Civic Education",icon:"🏛️"},
  {id:7,name:"Geography",icon:"🌍"},{id:8,name:"Commerce",icon:"💼"},
  {id:9,name:"Accounts",icon:"📊"},{id:10,name:"History",icon:"📜"},
  {id:11,name:"Religious Education",icon:"✝️"},{id:12,name:"Add. Maths",icon:"🔢"},
  {id:13,name:"Home Economics",icon:"🏠"},{id:14,name:"Computer Studies",icon:"💻"},
];
const PROVINCES = ["Central","Copperbelt","Eastern","Luapula","Lusaka","Muchinga","Northern","North-Western","Southern","Western"];

const sn = id => SUBJECTS.find(s => s.id === Number(id))?.name || "Unknown";
const si = id => SUBJECTS.find(s => s.id === Number(id))?.icon || "📚";
const fd = d => d ? new Date(d).toLocaleDateString("en-GB", {day:"numeric",month:"short",year:"numeric"}) : "";
const isSub = (subs, pays, sid) => {
  return (subs||[]).some(x => Number(x.subject_id)===Number(sid) && x.payment_status==="approved" && x.status==="active")
    || (pays||[]).some(x => Number(x.subject_id)===Number(sid) && x.status==="approved");
};

// Styles
const C = {g:"#0a6e3f",gd:"#064d2c",gl:"#12a05c",gp:"#edf7f2",gold:"#c9930a",goldp:"#fef9e7",w:"#fff",bg:"#f3f7f5",gr:"#6b7280",grl:"#dde8e3",grd:"#374151",dk:"#111827",d:"#dc2626",dl:"#fee2e2",ok:"#16a34a",okl:"#dcfce7",wa:"#d97706",wal:"#fef3c7"};
const Btn = (v="p", sm=false) => ({display:"inline-flex",alignItems:"center",gap:6,cursor:"pointer",border:"none",borderRadius:10,padding:sm?"7px 14px":"11px 20px",fontSize:sm?12:14,fontWeight:600,fontFamily:"'DM Sans',sans-serif",transition:"all 0.2s",
  ...(v==="p"?{background:`linear-gradient(135deg,${C.gd},${C.g})`,color:"#fff",boxShadow:"0 2px 10px rgba(10,110,63,0.25)"}
    :v==="gold"?{background:`linear-gradient(135deg,#a07010,${C.gold})`,color:"#fff"}
    :v==="d"?{background:C.d,color:"#fff"}:v==="gh"?{background:C.gp,color:C.g}:{background:C.grl,color:C.grd})});
const INP = {width:"100%",padding:"10px 14px",borderRadius:10,border:"1.5px solid #dde8e3",fontSize:14,fontFamily:"'DM Sans',sans-serif",outline:"none",background:"#fff",boxSizing:"border-box"};
const CARD = {background:"#fff",borderRadius:16,boxShadow:"0 2px 18px rgba(6,77,44,0.09)",padding:18,marginBottom:14,border:"1px solid #eef3f1"};
const LBL = {fontSize:13,fontWeight:600,color:C.grd,marginBottom:6,display:"block"};

// Auth Context
const AuthCtx = createContext(null);
function AuthProvider({children}) {
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);
  const load = useCallback(async () => {
    const t = localStorage.getItem("pms_tok");
    if (!t) { setLoading(false); return; }
    try { const u = await api("GET", "/auth/me", null, t); setProfile(u); }
    catch { localStorage.removeItem("pms_tok"); }
    finally { setLoading(false); }
  }, []);
  useEffect(() => { load(); }, [load]);
  const signIn = async (email, password) => {
    const d = await api("POST", "/auth/login", {email, password});
    localStorage.setItem("pms_tok", d.token); setProfile(d.user); return d.user;
  };
  const signUp = async (form) => {
    const d = await api("POST", "/auth/register", form);
    localStorage.setItem("pms_tok", d.token); setProfile(d.user); return d.user;
  };
  const signOut = () => { localStorage.removeItem("pms_tok"); setProfile(null); };
  const updateProfile = async (updates) => {
    const t = localStorage.getItem("pms_tok");
    const u = await api("PUT", "/auth/profile", updates, t);
    setProfile(u); return u;
  };
  return <AuthCtx.Provider value={{profile, loading, signIn, signUp, signOut, updateProfile, setProfile}}>{children}</AuthCtx.Provider>;
}
const useAuth = () => useContext(AuthCtx);

// Toast Context
const ToastCtx = createContext(null);
function ToastProvider({children}) {
  const [toasts, setToasts] = useState([]);
  const add = useCallback(({title, body, icon="🔔", type="i"}) => {
    const id = Date.now() + Math.random();
    setToasts(p => [...p.slice(-3), {id, title, body, icon, type}]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 5000);
  }, []);
  const bg = t => ({m:`linear-gradient(135deg,${C.gd},${C.g})`,w:`linear-gradient(135deg,#92400e,${C.gold})`,i:"linear-gradient(135deg,#1e3a8a,#3b82f6)",d:`linear-gradient(135deg,#7f1d1d,${C.d})`})[t] || `linear-gradient(135deg,${C.gd},${C.g})`;
  return (
    <ToastCtx.Provider value={{add}}>
      {children}
      <div style={{position:"fixed",top:14,right:14,zIndex:99999,display:"flex",flexDirection:"column",gap:8,maxWidth:300,width:"calc(100vw - 28px)"}}>
        {toasts.map(t => (
          <div key={t.id} onClick={() => setToasts(p => p.filter(x => x.id !== t.id))}
            style={{background:bg(t.type),color:"#fff",borderRadius:12,padding:"11px 13px",boxShadow:"0 8px 28px rgba(0,0,0,0.2)",cursor:"pointer",display:"flex",gap:9,alignItems:"flex-start",animation:"fadeUp 0.3s ease"}}>
            <span style={{fontSize:18}}>{t.icon}</span>
            <div><div style={{fontWeight:700,fontSize:12}}>{t.title}</div>{t.body && <div style={{fontSize:11,opacity:.9,marginTop:2}}>{t.body}</div>}</div>
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}
const useToast = () => useContext(ToastCtx);

// Spinner
const Spin = ({s=32}) => <div style={{display:"flex",justifyContent:"center",padding:28}}><div style={{width:s,height:s,border:"3px solid #edf7f2",borderTop:`3px solid ${C.g}`,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/></div>;

// Data hook
function useApi(path, deps=[]) {
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(true);
  const load = useCallback(async () => {
    const t = localStorage.getItem("pms_tok"); if (!t) return;
    try { const d = await api("GET", path, null, t); setData(Array.isArray(d) ? d : d); }
    catch(e) { console.warn(path, e.message); }
    finally { setLoading(false); }
  }, [path, ...deps]);
  useEffect(() => { load(); }, [load]);
  return {data, setData, loading, refetch: load};
}

// ── AUTH SCREEN ────────────────────────────────────────
function AuthScreen() {
  const {signIn, signUp} = useAuth();
  const {add} = useToast();
  const [mode, setMode] = useState("login");
  const [busy, setBusy] = useState(false);
  const [f, setF] = useState({name:"",email:"",password:"",role:"student",phone:"",grade:"",province:"Lusaka"});
  const set = (k, v) => setF(p => ({...p, [k]:v}));
  const doLogin = async e => {
    e.preventDefault(); setBusy(true);
    try { await signIn(f.email, f.password); }
    catch(e) { add({title:"Login failed", body:e.message, icon:"❌", type:"d"}); }
    finally { setBusy(false); }
  };
  const doReg = async e => {
    e.preventDefault(); if (!f.name||!f.email||!f.password) return; setBusy(true);
    try {
      await signUp(f);
      if (f.role==="tutor") add({title:"Registered! ⏳", body:"Wait for admin approval. WhatsApp 0772799672", icon:"⏳", type:"w"});
      else add({title:"Welcome! 🎉", body:"Account created successfully", icon:"🎓", type:"i"});
    }
    catch(e) { add({title:"Failed", body:e.message, icon:"❌", type:"d"}); }
    finally { setBusy(false); }
  };
  const I = (props) => <input style={{...INP, marginBottom:12}} {...props}/>;
  return (
    <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:`linear-gradient(150deg,${C.gd},#085e35,${C.gl})`,padding:14,overflow:"auto"}}>
      <div style={{background:"#fff",borderRadius:24,padding:28,width:"100%",maxWidth:390,boxShadow:"0 24px 80px rgba(0,0,0,0.25)",maxHeight:"92vh",overflowY:"auto"}}>
        <div style={{textAlign:"center",marginBottom:22}}>
          <div style={{width:68,height:68,borderRadius:20,background:`linear-gradient(135deg,#a07010,${C.gold})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,margin:"0 auto 12px",animation:"breathe 2s ease-in-out infinite"}}>🎓</div>
          <h1 style={{fontSize:19,color:C.gd,marginBottom:4}}>Peace Mindset</h1>
          <p style={{fontSize:10,color:C.gr,letterSpacing:"1.5px",textTransform:"uppercase"}}>Private School · GCE Online · Zambia 🇿🇲</p>
        </div>
        <div style={{display:"flex",background:"#f3f7f5",borderRadius:10,padding:3,marginBottom:20,gap:4}}>
          {[["login","🔑 Sign In"],["register","✨ Register"]].map(([m,l]) => (
            <button key={m} onClick={() => setMode(m)} style={{flex:1,padding:"9px 0",border:"none",borderRadius:8,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700,background:mode===m?`linear-gradient(135deg,${C.gd},${C.g})`:"transparent",color:mode===m?"#fff":C.gr}}>{l}</button>
          ))}
        </div>
        {mode==="login" ? (
          <form onSubmit={doLogin}>
            <label style={LBL}>Email Address</label>
            <I type="email" placeholder="your@email.com" value={f.email} onChange={e=>set("email",e.target.value)} required/>
            <label style={LBL}>Password</label>
            <I type="password" placeholder="••••••••" value={f.password} onChange={e=>set("password",e.target.value)} required/>
            <button type="submit" disabled={busy} style={{...Btn(),width:"100%",justifyContent:"center",fontSize:15,padding:"13px",opacity:busy?.7:1}}>
              {busy ? "⏳ Signing in..." : "🔑 Sign In"}
            </button>
            <p style={{textAlign:"center",marginTop:14,fontSize:13,color:C.gr}}>📱 WhatsApp: <strong style={{color:C.g}}>0772799672</strong></p>
          </form>
        ) : (
          <form onSubmit={doReg}>
            <label style={LBL}>Full Name *</label><I placeholder="Your full name" value={f.name} onChange={e=>set("name",e.target.value)} required/>
            <label style={LBL}>Email *</label><I type="email" value={f.email} onChange={e=>set("email",e.target.value)} required/>
            <label style={LBL}>Password *</label><I type="password" placeholder="Min 6 characters" minLength={6} value={f.password} onChange={e=>set("password",e.target.value)} required/>
            <label style={LBL}>Phone (WhatsApp)</label><I placeholder="e.g. 0977123456" value={f.phone} onChange={e=>set("phone",e.target.value)}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <div>
                <label style={LBL}>Register as</label>
                <select style={INP} value={f.role} onChange={e=>set("role",e.target.value)}>
                  <option value="student">👤 Student</option>
                  <option value="tutor">📚 Tutor</option>
                </select>
              </div>
              <div>
                <label style={LBL}>Province</label>
                <select style={INP} value={f.province} onChange={e=>set("province",e.target.value)}>
                  {PROVINCES.map(p => <option key={p}>{p}</option>)}
                </select>
              </div>
            </div>
            {f.role==="student" && (
              <div style={{marginBottom:12}}>
                <label style={LBL}>Grade</label>
                <select style={INP} value={f.grade} onChange={e=>set("grade",e.target.value)}>
                  <option value="">Select grade...</option>
                  {["Form 1","Form 2","Form 3","Form 4","Form 5 (Grade 11)","Grade 12","Repeater"].map(g=><option key={g}>{g}</option>)}
                </select>
              </div>
            )}
            {f.role==="tutor" && <div style={{background:C.goldp,borderRadius:10,padding:"10px 12px",marginBottom:12,fontSize:12,color:C.gold,fontWeight:600}}>⏳ Tutor accounts need admin approval before access.</div>}
            <button type="submit" disabled={busy} style={{...Btn(),width:"100%",justifyContent:"center",fontSize:15,padding:"13px",marginTop:8,opacity:busy?.7:1}}>
              {busy ? "⏳ Creating..." : "✨ Create Account"}
            </button>
          </form>
        )}
      </div>
    </div>
  );
}

// ── LAYOUT ─────────────────────────────────────────────
function Layout({nav, active, setActive, children}) {
  const {profile, signOut} = useAuth();
  const [menuOpen, setMenuOpen] = useState(false);
  const NavItem = ({item}) => {
    const on = active === item.id;
    return (
      <div onClick={() => {setActive(item.id); setMenuOpen(false);}}
        style={{display:"flex",alignItems:"center",gap:11,padding:"10px 14px",borderRadius:12,cursor:"pointer",marginBottom:2,position:"relative",transition:"all 0.15s",background:on?`linear-gradient(135deg,${C.gd},${C.g})`:"transparent",color:on?"#fff":C.grd}}>
        <span style={{fontSize:17,minWidth:20,textAlign:"center"}}>{item.icon}</span>
        <span style={{fontSize:13,fontWeight:on?700:500}}>{item.label}</span>
        {item.badge>0 && <span style={{position:"absolute",right:10,background:C.d,color:"#fff",borderRadius:20,padding:"1px 6px",fontSize:10,fontWeight:700}}>{item.badge}</span>}
      </div>
    );
  };
  const Sidebar = () => (
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#fff",borderRight:`1px solid ${C.grl}`}}>
      <div style={{padding:"18px 14px 14px",background:`linear-gradient(135deg,${C.gd},${C.g})`}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <div style={{width:42,height:42,borderRadius:12,background:`linear-gradient(135deg,#a07010,${C.gold})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🎓</div>
          <div>
            <div style={{color:"#fff",fontWeight:800,fontSize:12,fontFamily:"'Playfair Display',serif"}}>PEACE MINDSET</div>
            <div style={{color:"rgba(255,255,255,0.65)",fontSize:9,letterSpacing:"1.5px",textTransform:"uppercase"}}>GCE Online · Zambia 🇿🇲</div>
          </div>
        </div>
        <div style={{background:"rgba(255,255,255,0.15)",borderRadius:10,padding:"8px 10px",display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:32,height:32,borderRadius:"50%",background:profile?.role==="tutor"?C.gold:C.gl,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:14,overflow:"hidden",flexShrink:0}}>
            {profile?.avatarUrl ? <img src={profile.avatarUrl} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/> : (profile?.avatar||profile?.name?.[0]||"?")}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{color:"#fff",fontWeight:700,fontSize:12,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{profile?.name}</div>
            <div style={{color:"rgba(255,255,255,0.65)",fontSize:10,textTransform:"capitalize"}}>{profile?.role}</div>
          </div>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"10px 8px"}}>
        {nav.map(item => <NavItem key={item.id} item={item}/>)}

      <div style={{padding:"10px 8px",borderTop:`1px solid ${C.grl}`}}>
        <div onClick={signOut} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",cursor:"pointer",color:C.d,fontWeight:600,fontSize:13,borderRadius:10}}>
          <span>🚪</span> Sign Out

            );
          })}

      <style>{`@media(min-width:768px){#sidebar{display:block!important}}`}</style>

// ── PROFILE PAGE (works for all roles) ─────────────────
function ProfilePage() {
  const {profile, updateProfile, setProfile} = useAuth();
  const {add} = useToast();
  const [f, setF] = useState({name:profile?.name||"",phone:profile?.phone||"",grade:profile?.grade||"",province:profile?.province||"",bio:profile?.bio||""});
  const [saving, setSaving] = useState(false);
  const [avatarFile, setAvatarFile] = useState(null);
  const [uploading, setUploading] = useState(false);
  const tok = localStorage.getItem("pms_tok");

  const save = async () => {
    setSaving(true);
    try { await updateProfile(f); add({title:"✅ Profile saved!", icon:"👤", type:"i"}); }
    catch(e) { add({title:"Error", body:e.message, icon:"❌", type:"d"}); }
    finally { setSaving(false); }
  };

  const uploadPic = async () => {
    if (!avatarFile) return;
    setUploading(true);
    try {
      const fd = new FormData(); fd.append("avatar", avatarFile);
      const d = await api("POST", "/auth/avatar", null, tok, fd);
      setProfile(d.user);
      add({title:"✅ Picture uploaded to Cloudinary!", icon:"🖼️", type:"i"});
      setAvatarFile(null);
    }
    catch(e) { add({title:"Upload failed", body:e.message, icon:"❌", type:"d"}); }
    finally { setUploading(false); }
  };

  return (
    <div style={{maxWidth:460}}>
      <h2 style={{color:C.gd,marginBottom:14,fontSize:18}}>👤 My Profile</h2>
      <div style={CARD}>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{width:76,height:76,borderRadius:"50%",background:`linear-gradient(135deg,${C.gd},${C.g})`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:30,margin:"0 auto 10px",overflow:"hidden"}}>

  const {data:payments} = useApi("/subscriptions/payments/mine", [profile?._id]);

  const nav = [
    {id:"home",icon:"🏠",label:"Dashboard"},
    {id:"subjects",icon:"📚",label:"Subjects"},
    {id:"mats",icon:"📄",label:"Materials"},

    {id:"anns",icon:"📢",label:"Announcements"},

    switch(activeNav) {

    catch(e) { add({title:"Failed", body:e.message, icon:"❌", type:"d"}); }

  if (loading) return <Spin/>;
  return (
    <div>
      <h2 style={{color:C.gd,marginBottom:14,fontSize:18}}>📝 Assignments</h2>
      {asns.length===0 && <div style={{textAlign:"center",padding:40,color:C.gr}}>No assignments yet</div>}

          <div key={a._id} style={{...CARD,borderLeft:`4px solid ${s?s.status==="graded"?C.ok:C.wa:C.g}`}}>

            </div>
            {a.description && <p style={{fontSize:13,color:C.grd,marginBottom:10,lineHeight:1.5}}>{a.description}</p>}
            {a.file_url && <a href={a.file_url} target="_blank" rel="noreferrer" style={{fontSize:12,color:C.g,fontWeight:600,display:"block",marginBottom:8}}>📎 View file</a>}
            {s?.feedback && <div style={{background:C.gp,borderRadius:8,padding:"8px 12px",fontSize:12,color:C.gd,marginBottom:8}}>💬 Tutor: {s.feedback}</div>}
            {!s && ok && (sub===a._id ? (

                <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                  <input type="file" onChange={e=>setFi(e.target.files[0])} style={{fontSize:12}}/>
                  <button style={{...Btn("p",true),fontSize:12}} onClick={()=>doSub(a)} disabled={busy}>{busy?"⏳...":"📤 Submit"}</button>
                  <button style={{...Btn("gh",true),fontSize:12}} onClick={()=>{setSub(null);setTxt("");setFi(null);}}>Cancel</button>
                </div>
              </div>
            ) : <button style={Btn("p",true)} onClick={()=>setSub(a._id)}>📤 Submit Assignment</button>)}
            {!ok && <span style={{fontSize:12,color:C.d,fontWeight:600}}>🔒 Subscribe to submit</span>}

function TestsPage({subs, payments}) {
  const {profile} = useAuth(); const {add} = useToast();
  const {data:tests, loading} = useApi("/tests");
  const {data:questions} = useApi("/tests/questions");
  const {data:results, refetch} = useApi("/tests/results", [profile?._id]);
  const [active, setActive] = useState(null); const [answers, setAnswers] = useState({}); const [timeLeft, setTimeLeft] = useState(0); const [done, setDone] = useState(false); const timer = useRef(null);
  const tok = localStorage.getItem("pms_tok");
  const start = test => {setActive(test); setAnswers({}); setDone(false); setTimeLeft(test.duration*60);};
  useEffect(() => { if (!active||done) return; timer.current = setInterval(()=>setTimeLeft(t=>{if(t<=1){clearInterval(timer.current);submit();return 0;}return t-1;}),1000); return ()=>clearInterval(timer.current); }, [active,done]);
  const submit = async () => {
    if (!active||done) return; clearInterval(timer.current); setDone(true);
    try { await api("POST",`/tests/${active._id}/submit`,{answers},tok); refetch(); add({title:"✅ Test Submitted!", icon:"🎯", type:"i"}); setTimeout(()=>{setActive(null);setDone(false);},2000); }
    catch(e) { add({title:"Error", body:e.message, icon:"⚠️", type:"w"}); setTimeout(()=>setActive(null),2000); }
  };
  if (active) {
    const qs = questions.filter(q=>q.test_id===active._id);
    const m = Math.floor(timeLeft/60).toString().padStart(2,"0");
    const s = (timeLeft%60).toString().padStart(2,"0");
    return (
      <div style={{maxWidth:620}}>
        <div style={{background:`linear-gradient(135deg,${C.gd},${C.g})`,borderRadius:14,padding:"14px 18px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center",color:"#fff"}}>
          <div><div style={{fontWeight:700,fontSize:15}}>{active.title}</div><div style={{fontSize:11,opacity:.8}}>{qs.length} questions</div></div>
          <div style={{textAlign:"center"}}><div style={{fontSize:26,fontWeight:800,color:timeLeft<60?"#fca5a5":"#fff"}}>{m}:{s}</div><div style={{fontSize:10,opacity:.7}}>Time Left</div></div>
          <button style={{...Btn("d",true),fontSize:12}} onClick={submit} disabled={done}>{done?"⏳":"📤 Submit"}</button>
        </div>
        {qs.map((q,i) => (
          <div key={q._id} style={CARD}>
            <div style={{fontWeight:600,fontSize:14,marginBottom:12}}>Q{i+1}. {q.question}</div>
            {q.type==="mcq" && q.options?.map(o => (<label key={o} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:9,marginBottom:7,cursor:"pointer",border:`2px solid ${answers[q._id]===o?C.g:C.grl}`,background:answers[q._id]===o?C.gp:"#fff",transition:"all 0.15s"}}><input type="radio" name={q._id} checked={answers[q._id]===o} onChange={()=>setAnswers(p=>({...p,[q._id]:o}))} style={{accentColor:C.g}}/><span style={{fontSize:13}}>{o}</span></label>))}
            {q.type==="truefalse" && ["True","False"].map(o => (<label key={o} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:9,marginBottom:7,cursor:"pointer",border:`2px solid ${answers[q._id]===o.toLowerCase()?C.g:C.grl}`,background:answers[q._id]===o.toLowerCase()?C.gp:"#fff"}}><input type="radio" name={q._id} checked={answers[q._id]===o.toLowerCase()} onChange={()=>setAnswers(p=>({...p,[q._id]:o.toLowerCase()}))} style={{accentColor:C.g}}/><span style={{fontSize:13,fontWeight:600}}>{o}</span></label>))}
            {q.type==="short" && <input style={INP} placeholder="Type your answer..." value={answers[q._id]||""} onChange={e=>setAnswers(p=>({...p,[q._id]:e.target.value}))}/>}
          </div>
        ))}
        <button style={{...Btn(),width:"100%",justifyContent:"center",fontSize:15}} onClick={submit} disabled={done}>{done?"⏳ Submitting...":"📤 Submit Test"}</button>
      </div>
    );
  }
  if (loading) return <Spin/>;
  return (
    <div>
      <h2 style={{color:C.gd,marginBottom:14,fontSize:18}}>✏️ Tests & Quizzes</h2>
      {tests.length===0 && <div style={{textAlign:"center",padding:40,color:C.gr}}>No tests yet</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:14}}>
        {tests.map(t => {
          const qs = questions.filter(q=>q.test_id===t._id);
          const ok = isSub(subs, payments, t.subject_id);
          const res = results.find?results.find(r=>r.test_id===t._id):null;
          const pct = res?.percent??null;
          return (
            <div key={t._id} style={{background:"#fff",borderRadius:14,padding:18,boxShadow:"0 2px 12px rgba(6,77,44,0.07)",border:`2px solid ${res?pct>=70?"#bbf7d0":pct>=50?"#fde68a":"#fecaca":"#eef3f1"}`,position:"relative"}}>
              {res && <div style={{position:"absolute",top:12,right:12,background:pct>=70?C.okl:pct>=50?C.goldp:C.dl,color:pct>=70?C.ok:pct>=50?C.gold:C.d,borderRadius:9,padding:"5px 10px",fontWeight:800,fontSize:15}}>{pct}%</div>}
              <div style={{fontSize:32,marginBottom:8}}>{si(t.subject_id)}</div>
              <h3 style={{margin:"0 0 5px",color:C.gd,fontSize:14,paddingRight:res?55:0}}>{t.title}</h3>
              <div style={{fontSize:11,color:C.gr,marginBottom:12}}>{sn(t.subject_id)} · {qs.length} Q · {t.duration}min</div>
              {!ok ? <span style={{fontSize:12,color:C.d,fontWeight:600}}>🔒 Subscribe to unlock</span>

function SubscribePage() {
  const {profile} = useAuth(); const {add} = useToast();
  const {data:subs} = useApi("/subscriptions/mine", [profile?._id]);
  const {data:pays, refetch} = useApi("/subscriptions/payments/mine", [profile?._id]);
  const [sel, setSel] = useState([]); const [method, setMethod] = useState("mtn"); const [txn, setTxn] = useState(""); const [months, setMonths] = useState(1); const [notes, setNotes] = useState(""); const [receipt, setReceipt] = useState(null); const [busy, setBusy] = useState(false);
  const tok = localStorage.getItem("pms_tok");
  const actIds = new Set([...subs.filter(s=>s.payment_status==="approved"&&s.status==="active").map(s=>Number(s.subject_id)),...pays.filter(p=>p.status==="approved").map(p=>Number(p.subject_id))]);
  const pendIds = new Set(pays.filter(p=>p.status==="pending").map(p=>Number(p.subject_id)));
  const toggle = id => setSel(p => p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const price = 85;
  const submit = async () => {
    if (!sel.length||!txn.trim()) {add({title:"Missing info", body:"Select subjects & enter transaction ID", icon:"⚠️", type:"w"}); return;}
    setBusy(true);
    try {
      for (const sid of sel) {
        const fd = new FormData(); fd.append("subject_id",sid); fd.append("amount",price*months); fd.append("months",months); fd.append("method",method); fd.append("transaction_id",txn); fd.append("notes",notes); if (receipt) fd.append("receipt",receipt);
        await api("POST", "/subscriptions/payment", null, tok, fd);
      }
      add({title:"✅ Payment submitted!", body:"Admin will verify. WhatsApp 0772799672 for fast approval.", icon:"💳", type:"i"});
      setSel([]); setTxn(""); setReceipt(null); setNotes(""); refetch();
    }
    catch(e) { add({title:"Error", body:e.message, icon:"❌", type:"d"}); }
    finally { setBusy(false); }
  };
  return (
    <div style={{maxWidth:620}}>
      <h2 style={{color:C.gd,marginBottom:4,fontSize:18}}>💳 Subscribe to Subjects</h2>
      <p style={{color:C.gr,fontSize:13,marginBottom:14}}>ZMW 85 per subject per month</p>
      <div style={{...CARD,background:C.gp,border:"1px solid #c8e8d8",marginBottom:14}}>
        <h3 style={{color:C.gd,margin:"0 0 10px",fontSize:14}}>💳 Payment Numbers</h3>
        {[{lb:"📱 MTN Mobile Money",num:"0761468402"},{lb:"📱 Airtel Money",num:"0570109056"},{lb:"🏦 Bank (Absa)",num:"Visit school"},{lb:"💵 Cash",num:"School office"}].map(p=>(
          <div key={p.lb} style={{display:"flex",gap:10,marginBottom:6}}><strong style={{fontSize:13}}>{p.lb}:</strong><span style={{fontSize:13,color:C.gr}}>{p.num}</span></div>
        ))}
        <div style={{borderTop:"1px solid #c8e8d8",marginTop:10,paddingTop:10,fontSize:12,color:C.gd,fontWeight:600}}>Pay first → come back here → submit your receipt below ↓</div>
      </div>
      {actIds.size>0 && <div style={{...CARD,marginBottom:14}}><h3 style={{color:C.gd,margin:"0 0 10px",fontSize:14}}>✅ Active Subscriptions</h3><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{[...actIds].map(id=>{const s=SUBJECTS.find(x=>x.id===id);return s?<span key={id} style={{background:C.okl,color:C.ok,borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:600}}>{s.icon} {s.name}</span>:null;})}</div></div>}
      <div style={CARD}>
        <h3 style={{color:C.gd,margin:"0 0 14px",fontSize:14}}>📚 Select Subjects</h3>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(128px,1fr))",gap:8}}>
          {SUBJECTS.map(s => {
            const act=actIds.has(s.id),pend=pendIds.has(s.id),picked=sel.includes(s.id);
            return (
              <div key={s.id} onClick={()=>!act&&!pend&&toggle(s.id)}
                style={{borderRadius:10,padding:"10px 12px",border:`2px solid ${act?C.ok:pend?C.gold:picked?C.g:C.grl}`,cursor:act||pend?"not-allowed":"pointer",background:act?C.okl:pend?C.goldp:picked?C.gp:"#fff",textAlign:"center",transition:"all 0.15s"}}>
                <div style={{fontSize:24,marginBottom:4}}>{s.icon}</div>
                <div style={{fontSize:11,fontWeight:700,marginBottom:3}}>{s.name}</div>
                {act?<span style={{fontSize:9,color:C.ok,fontWeight:600}}>Active</span>:pend?<span style={{fontSize:9,color:C.gold,fontWeight:600}}>Pending</span>:picked?<span style={{fontSize:9,color:C.g,fontWeight:600}}>✓ Selected</span>:<span style={{fontSize:9,color:C.gr}}>ZMW {price}</span>}
              </div>
            );
          })}
        </div>
      </div>
      {sel.length>0 && (
        <div style={CARD}>
          <div style={{background:C.gp,borderRadius:10,padding:"12px 14px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:13,color:C.gr}}>{sel.length} subject{sel.length!==1?"s":""} × {months} month{months!==1?"s":""}</span>
            <span style={{fontSize:20,fontWeight:800,color:C.gd,fontFamily:"'Playfair Display',serif"}}>ZMW {sel.length*price*months}</span>
          </div>
          <div style={{marginBottom:12}}>
            <label style={LBL}>Months</label>
            <select style={INP} value={months} onChange={e=>setMonths(Number(e.target.value))}>
              {[1,2,3,6].map(m=><option key={m} value={m}>{m} month{m>1?"s":""} — ZMW {sel.length*price*m}</option>)}
            </select>
          </div>
          <div style={{marginBottom:12}}>
            <label style={LBL}>Payment Method</label>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {[{id:"mtn",lb:"📱 MTN MoMo",nm:"0761468402"},{id:"airtel",lb:"📱 Airtel",nm:"0570109056"},{id:"bank",lb:"🏦 Bank",nm:"Absa"},{id:"cash",lb:"💵 Cash",nm:"Office"}].map(pm=>(
                <div key={pm.id} onClick={()=>setMethod(pm.id)} style={{borderRadius:9,padding:"9px 11px",border:`2px solid ${method===pm.id?C.g:C.grl}`,cursor:"pointer",background:method===pm.id?C.gp:"#fff"}}>
                  <div style={{fontSize:12,fontWeight:700}}>{pm.lb}</div>
                  <div style={{fontSize:10,color:C.gr}}>{pm.nm}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{marginBottom:12}}><label style={LBL}>Transaction / Reference ID *</label><input style={INP} placeholder="e.g. MTN-REF-123456789" value={txn} onChange={e=>setTxn(e.target.value)}/></div>
          <div style={{marginBottom:12}}><label style={LBL}>Upload Receipt (photo of payment)</label><input type="file" accept="image/*" onChange={e=>setReceipt(e.target.files[0])} style={{fontSize:12,padding:4}}/></div>
          <div style={{marginBottom:16}}><label style={LBL}>Additional Notes</label><textarea style={{...INP,height:60,resize:"vertical"}} value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Any extra information..."/></div>
          <button style={{...Btn(),width:"100%",justifyContent:"center",fontSize:15}} onClick={submit} disabled={busy}>{busy?"⏳ Submitting...":"💳 Submit Payment Request"}</button>
        </div>
      )}
      {pays.length>0 && (
        <div style={CARD}>
          <h3 style={{color:C.gd,margin:"0 0 12px",fontSize:14}}>📋 My Payment History</h3>
          {pays.map(p => (
            <div key={p._id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C.grl}`,gap:10}}>
              <div>
                <div style={{fontWeight:600,fontSize:13}}>{si(p.subject_id)} {sn(p.subject_id)}</div>
                <div style={{fontSize:11,color:C.gr}}>ZMW {p.amount} · {p.method?.toUpperCase()} · {fd(p.createdAt)}</div>
                {p.admin_note && <div style={{fontSize:11,color:p.status==="rejected"?C.d:C.ok,marginTop:2}}>💬 {p.admin_note}</div>}
              </div>
              <span style={{background:p.status==="approved"?C.okl:p.status==="rejected"?C.dl:C.wal,color:p.status==="approved"?C.ok:p.status==="rejected"?C.d:C.wa,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:600,flexShrink:0}}>{p.status==="approved"?"✅ Approved":p.status==="rejected"?"❌ Rejected":"⏳ Pending"}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
