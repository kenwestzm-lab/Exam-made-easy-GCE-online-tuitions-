<script type="text/babel" data-presets="react,env">
const {useState,useEffect,useRef,useCallback,createContext,useContext,memo} = React;

// ── BACKEND URL ────────────────────────────────────────
const BACKEND = "https://exam-made-easy-gce-online-tuitions.onrender.com";

// ── API ────────────────────────────────────────────────
const api = async (method, path, body, token, fd) => {
  try {
    const o = {method, headers:{}};
    if (token) o.headers['Authorization'] = `Bearer ${token}`;
    if (body && !fd) { o.headers['Content-Type']='application/json'; o.body=JSON.stringify(body); }
    else if (fd) o.body = fd;
    const r = await fetch(`${BACKEND}/api${path}`, o);
    const d = await r.json().catch(()=>({}));
    if (!r.ok) throw new Error(d.error || `Server error ${r.status}`);
    return d;
  } catch(e) {
    if (e.message.includes('fetch')) throw new Error('Cannot connect to server. Make sure Render backend is running.');
    throw e;
  }
};

const tok = () => localStorage.getItem("pms_t");

// ── DATA ───────────────────────────────────────────────
const SUBJECTS = [
  {id:1,n:"Mathematics",i:"📐",c:"#0a6e3f"},{id:2,n:"English",i:"📖",c:"#1d4ed8"},
  {id:3,n:"Biology",i:"🌿",c:"#16a34a"},{id:4,n:"Chemistry",i:"⚗️",c:"#7c3aed"},
  {id:5,n:"Physics",i:"⚡",c:"#d97706"},{id:6,n:"Civic Education",i:"🏛️",c:"#dc2626"},
  {id:7,n:"Geography",i:"🌍",c:"#0891b2"},{id:8,n:"Commerce",i:"💼",c:"#9333ea"},
  {id:9,n:"Accounts",i:"📊",c:"#c9930a"},{id:10,n:"History",i:"📜",c:"#b45309"},
  {id:11,n:"Religious Ed",i:"✝️",c:"#4f46e5"},{id:12,n:"Add. Maths",i:"🔢",c:"#0f766e"},
  {id:13,n:"Home Economics",i:"🏠",c:"#be185d"},{id:14,n:"Computer Studies",i:"💻",c:"#1e40af"},
];
const PROVINCES = ["Central","Copperbelt","Eastern","Luapula","Lusaka","Muchinga","Northern","North-Western","Southern","Western"];
const sn = id => SUBJECTS.find(s=>s.id===Number(id))?.n||"Unknown";
const si = id => SUBJECTS.find(s=>s.id===Number(id))?.i||"📚";
const fd = d => d ? new Date(d).toLocaleDateString("en-GB",{day:"numeric",month:"short"}) : "";
const isSub = (subs,pays,sid) =>
  (subs||[]).some(x=>Number(x.subject_id)===Number(sid)&&x.payment_status==="approved"&&x.status==="active") ||
  (pays||[]).some(x=>Number(x.subject_id)===Number(sid)&&x.status==="approved");

// ── STYLES ─────────────────────────────────────────────
const C = {g:"#0a6e3f",gd:"#064d2c",gl:"#12a05c",gp:"#edf7f2",gold:"#c9930a",goldp:"#fef9e7",w:"#fff",gr:"#6b7280",grl:"#dde8e3",grd:"#374151",dk:"#111827",d:"#dc2626",dl:"#fee2e2",ok:"#16a34a",okl:"#dcfce7",wa:"#d97706",wal:"#fef3c7"};
const Btn = (v="p",sm=false)=>({display:"inline-flex",alignItems:"center",justifyContent:"center",gap:7,cursor:"pointer",border:"none",borderRadius:12,padding:sm?"9px 16px":"14px 24px",fontSize:sm?13:15,fontWeight:700,fontFamily:"'DM Sans',sans-serif",transition:"all 0.2s",WebkitTapHighlightColor:"transparent",
  ...(v==="p"?{background:`linear-gradient(135deg,${C.gd},${C.g})`,color:"#fff",boxShadow:"0 4px 16px rgba(10,110,63,0.35)"}
    :v==="gold"?{background:`linear-gradient(135deg,#a07010,${C.gold})`,color:"#fff",boxShadow:"0 4px 14px rgba(201,147,10,0.35)"}
    :v==="d"?{background:C.d,color:"#fff"}:v==="gh"?{background:C.gp,color:C.g,border:`1.5px solid ${C.gl}`}
    :v==="w"?{background:"#fff",color:C.gd,boxShadow:"0 2px 12px rgba(0,0,0,0.1)"}
    :{background:C.grl,color:C.grd})});
const INP = {width:"100%",padding:"14px 16px",borderRadius:12,border:"2px solid #e5e7eb",fontSize:15,fontFamily:"'DM Sans',sans-serif",outline:"none",background:"#fff",boxSizing:"border-box",transition:"border-color 0.2s"};
const CARD = {background:"#fff",borderRadius:18,boxShadow:"0 4px 24px rgba(6,77,44,0.10)",padding:20,marginBottom:14,border:"1px solid #eef3f1"};
const LBL = {fontSize:13,fontWeight:600,color:C.grd,marginBottom:7,display:"block"};

// ── AUTH CONTEXT ───────────────────────────────────────
const AuthCtx = createContext(null);
function AuthProvider({children}) {
  const [profile,setProfile] = useState(null);
  const [loading,setLoading] = useState(true);
  useEffect(()=>{
    const t = tok();
    if (!t) { setLoading(false); return; }
    api("GET","/auth/me",null,t)
      .then(u => setProfile(u))
      .catch(()=>localStorage.removeItem("pms_t"))
      .finally(()=>setLoading(false));
  },[]);
  const signIn = async(email,pw) => {
    const d = await api("POST","/auth/login",{email,password:pw});
    localStorage.setItem("pms_t",d.token); setProfile(d.user); return d.user;
  };
  const signUp = async(form) => {
    const d = await api("POST","/auth/register",form);
    localStorage.setItem("pms_t",d.token); setProfile(d.user); return d.user;
  };
  const signOut = () => { localStorage.removeItem("pms_t"); setProfile(null); };
  const updateProfile = async(u) => {
    const d = await api("PUT","/auth/profile",u,tok()); setProfile(d); return d;
  };
  return <AuthCtx.Provider value={{profile,loading,signIn,signUp,signOut,updateProfile,setProfile}}>{children}</AuthCtx.Provider>;
}
const useAuth = ()=>useContext(AuthCtx);

// ── TOAST ──────────────────────────────────────────────
const ToastCtx = createContext(null);
function ToastProvider({children}) {
  const [ts,setTs] = useState([]);
  const add = useCallback(({title,body,icon="🔔",type="i"})=>{
    const id = Date.now()+Math.random();
    setTs(p=>[...p.slice(-3),{id,title,body,icon,type}]);
    setTimeout(()=>setTs(p=>p.filter(t=>t.id!==id)),5000);
  },[]);
  const bg = t=>({m:`linear-gradient(135deg,${C.gd},${C.g})`,w:`linear-gradient(135deg,#92400e,${C.gold})`,i:"linear-gradient(135deg,#1e3a8a,#3b82f6)",d:`linear-gradient(135deg,#7f1d1d,${C.d})`})[t]||`linear-gradient(135deg,${C.gd},${C.g})`;
  return (
    <ToastCtx.Provider value={{add}}>
      {children}
      <div style={{position:"fixed",top:16,right:14,zIndex:99999,display:"flex",flexDirection:"column",gap:8,maxWidth:320,width:"calc(100vw - 28px)",pointerEvents:"none"}}>
        {ts.map(t=>(
          <div key={t.id} onClick={()=>setTs(p=>p.filter(x=>x.id!==t.id))}
            style={{background:bg(t.type),color:"#fff",borderRadius:16,padding:"13px 16px",boxShadow:"0 8px 32px rgba(0,0,0,0.25)",display:"flex",gap:10,alignItems:"flex-start",animation:"fadeUp 0.3s ease",pointerEvents:"auto",cursor:"pointer"}}>
            <span style={{fontSize:20,flexShrink:0}}>{t.icon}</span>
            <div><div style={{fontWeight:700,fontSize:13,lineHeight:1.3}}>{t.title}</div>{t.body&&<div style={{fontSize:11,opacity:.9,marginTop:2,lineHeight:1.4}}>{t.body}</div>}</div>
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}
const useToast = ()=>useContext(ToastCtx);
const Spin = ({s=36})=><div style={{display:"flex",justifyContent:"center",padding:32}}><div style={{width:s,height:s,border:"3px solid #edf7f2",borderTop:`3px solid ${C.g}`,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/></div>;

function useApiData(path,deps=[]) {
  const [data,setData] = useState([]);
  const [loading,setLoading] = useState(true);
  const load = useCallback(async()=>{
    const t = tok(); if(!t) return;
    try{const d=await api("GET",path,null,t); setData(Array.isArray(d)?d:d);}
    catch(e){console.warn(path,e.message);}
    finally{setLoading(false);}
  },[path,...deps]);
  useEffect(()=>{load();},[load]);
  return {data,setData,loading,refetch:load};
}

// ── BEAUTIFUL AUTH SCREEN ──────────────────────────────
function AuthScreen() {
  const {signIn,signUp} = useAuth();
  const {add} = useToast();
  const [tab,setTab] = useState("login"); // login | register
  const [busy,setBusy] = useState(false);
  const [err,setErr] = useState("");

  // ✅ FIX: Use refs instead of state for inputs (prevents keyboard closing)
  const emailRef = useRef();
  const passRef = useRef();
  const nameRef = useRef();
  const phoneRef = useRef();
  const gradeRef = useRef();
  const [role,setRole] = useState("student");
  const [province,setProv] = useState("Lusaka");

  const doLogin = async(e) => {
    e.preventDefault();
    const email = emailRef.current?.value?.trim();
    const password = passRef.current?.value;
    if (!email||!password) { setErr("Please enter email and password"); return; }
    setBusy(true); setErr("");
    try { await signIn(email,password); }
    catch(e) { setErr(e.message); add({title:"Login failed",body:e.message,icon:"❌",type:"d"}); }
    finally { setBusy(false); }
  };

  const doRegister = async(e) => {
    e.preventDefault();
    const name = nameRef.current?.value?.trim();
    const email = emailRef.current?.value?.trim();
    const password = passRef.current?.value;
    const phone = phoneRef.current?.value?.trim();
    const grade = gradeRef.current?.value;
    if (!name||!email||!password) { setErr("Please fill all required fields"); return; }
    if (password.length < 6) { setErr("Password must be at least 6 characters"); return; }
    setBusy(true); setErr("");
    try {
      await signUp({name,email,password,role,phone,grade,province});
      if (role==="tutor") add({title:"Account created! ⏳",body:"Wait for admin approval. WhatsApp: 0772799672",icon:"⏳",type:"w"});
    }
    catch(e) { setErr(e.message); }
    finally { setBusy(false); }
  };

  return (
    <div style={{minHeight:"100vh",overflow:"auto",background:`linear-gradient(160deg,${C.gd} 0%,#085e35 40%,#0d7a48 70%,#1aa85f 100%)`}}>
      {/* Header with floating subjects */}
      <div style={{padding:"40px 20px 0",textAlign:"center",animation:"fadeUp 0.6s ease"}}>
        {/* Logo */}
        <div style={{width:90,height:90,borderRadius:28,background:`linear-gradient(135deg,#8a6200,${C.gold},${C.goldl})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:44,margin:"0 auto 16px",boxShadow:"0 12px 40px rgba(201,147,10,0.5)",animation:"float 3s ease-in-out infinite"}}>🎓</div>
        <h1 style={{color:"#fff",fontSize:28,letterSpacing:"1px",marginBottom:6,fontFamily:"'Playfair Display',serif"}}>PEACE MINDSET</h1>
        <h2 style={{color:"#fff",fontSize:16,fontWeight:400,marginBottom:4}}>PRIVATE SCHOOL</h2>
        <p style={{color:"rgba(255,255,255,0.75)",fontSize:13,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:24}}>GCE Online Lessons · Zambia 🇿🇲</p>

        {/* Subject chips */}
        <div style={{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:8,marginBottom:32,padding:"0 10px"}}>
          {SUBJECTS.slice(0,8).map(s=>(
            <div key={s.id} style={{background:"rgba(255,255,255,0.15)",backdropFilter:"blur(10px)",border:"1px solid rgba(255,255,255,0.25)",borderRadius:50,padding:"6px 14px",display:"flex",alignItems:"center",gap:6,animation:"slideIn 0.5s ease"}}>
              <span style={{fontSize:16}}>{s.i}</span>
              <span style={{color:"#fff",fontSize:12,fontWeight:600}}>{s.n}</span>
            </div>
          ))}
          <div style={{background:"rgba(255,255,255,0.15)",backdropFilter:"blur(10px)",border:"1px solid rgba(255,255,255,0.25)",borderRadius:50,padding:"6px 14px"}}>
            <span style={{color:"#fff",fontSize:12,fontWeight:600}}>+6 more</span>
          </div>
        </div>

        {/* Price tag */}
        <div style={{display:"inline-flex",alignItems:"center",gap:8,background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:50,padding:"8px 20px",marginBottom:28}}>
          <span style={{fontSize:20}}>💰</span>
          <span style={{color:"#fff",fontSize:13,fontWeight:700}}>ZMW 85/subject/month</span>
          <span style={{color:"rgba(255,255,255,0.7)",fontSize:11}}>· MTN: 0761468402 · Airtel: 0570109056</span>
        </div>
      </div>

      {/* Login Card */}
      <div style={{background:"#fff",borderRadius:"28px 28px 0 0",padding:"28px 24px 40px",minHeight:"55vh",boxShadow:"0 -8px 40px rgba(0,0,0,0.2)"}}>
        {/* Tabs */}
        <div style={{display:"flex",background:"#f3f7f5",borderRadius:14,padding:4,marginBottom:24,gap:4}}>
          {[["login","🔑 Sign In"],["register","✨ Create Account"]].map(([m,l])=>(
            <button key={m} type="button" onClick={()=>{setTab(m);setErr("");}}

        </div>

        {err && (
          <div style={{background:C.dl,color:C.d,borderRadius:10,padding:"11px 14px",marginBottom:16,fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:8}}>
            <span>⚠️</span>{err}

        {tab==="login" ? (
          <form onSubmit={doLogin} autoComplete="on">
            <div style={{marginBottom:16}}>
              <label style={LBL}>📧 Email Address</label>

                style={INP} autoComplete="email" autoCapitalize="none"/>
            </div>
            <div style={{marginBottom:22}}>
              <label style={LBL}>🔑 Password</label>
              <input ref={passRef} type="password" placeholder="••••••••"
                style={INP} autoComplete="current-password"/>
            </div>
            <button type="submit" disabled={busy}
              style={{...Btn(),width:"100%",fontSize:16,padding:"16px",opacity:busy?.7:1}}>
              {busy ? "⏳ Signing in..." : "🎓 Sign In to Learn"}
            </button>
            <div style={{textAlign:"center",marginTop:18,fontSize:13,color:C.gr}}>
              📱 WhatsApp support: <strong style={{color:C.g}}>0772799672</strong>
            </div>
          </form>
        ) : (
          <form onSubmit={doRegister} autoComplete="on" style={{paddingBottom:20}}>
            <div style={{marginBottom:14}}>
              <label style={LBL}>👤 Full Name *</label>
              <input ref={nameRef} type="text" placeholder="Your full name"
                style={INP} autoComplete="name"/>
            </div>
            <div style={{marginBottom:14}}>
              <label style={LBL}>📧 Email Address *</label>
              <input ref={emailRef} type="email" placeholder="your@email.com"
                style={INP} autoComplete="email" autoCapitalize="none"/>
            </div>
            <div style={{marginBottom:14}}>
              <label style={LBL}>🔑 Password * (min 6 characters)</label>
              <input ref={passRef} type="password" placeholder="Create a strong password"
                style={INP} autoComplete="new-password"/>

            <div style={{marginBottom:14}}>
              <label style={LBL}>📱 Phone / WhatsApp</label>

            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
              <div>
                <label style={LBL}>Register as *</label>
                <select style={{...INP,appearance:"none"}} value={role} onChange={e=>setRole(e.target.value)}>

                </select>
              </div>
              <div>
                <label style={LBL}>🗺️ Province *</label>

              </div>
            </div>
            {role==="student" && (
              <div style={{marginBottom:14}}>
                <label style={LBL}>🏫 Grade / Form</label>
                <select ref={gradeRef} style={{...INP,appearance:"none"}}>
                  <option value="">Select your grade...</option>
                  {["Form 1","Form 2","Form 3","Form 4","Form 5 (Grade 11)","Grade 12","Repeater"].map(g=><option key={g}>{g}</option>)}
                </select>
              </div>
            )}
            {role==="tutor" && (
              <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:12,padding:"12px 14px",marginBottom:14}}>
                <div style={{fontSize:13,color:"#92400e",fontWeight:600}}>⏳ Tutor accounts need admin approval before access.</div>
                <div style={{fontSize:12,color:"#92400e",marginTop:4}}>After registering, WhatsApp 0772799672 for faster approval!</div>
              </div>
            )}
            <button type="submit" disabled={busy}
              style={{...Btn(),width:"100%",fontSize:16,padding:"16px",opacity:busy?.7:1}}>
              {busy ? "⏳ Creating account..." : "✨ Create My Account"}
            </button>
            <div style={{textAlign:"center",marginTop:16,fontSize:13,color:C.gr}}>
              📱 WhatsApp: <strong style={{color:C.g}}>0772799672</strong>
            </div>
          </form>
        )}

        {/* Footer info */}
        <div style={{marginTop:24,padding:"16px",background:"#f8faff",borderRadius:14,border:"1px solid #e8f0fe"}}>
          <div style={{fontSize:12,color:C.gr,textAlign:"center",lineHeight:1.7}}>
            💳 <strong>MTN MoMo:</strong> 0761468402 &nbsp;|&nbsp; <strong>Airtel:</strong> 0570109056<br/>
            🏫 Peace Mindset Private School · Lusaka, Zambia
          </div>
        </div>
      </div>
    </div>
  );
}

// ── LAYOUT ─────────────────────────────────────────────

// ── PROFILE PAGE ───────────────────────────────────────
function ProfilePage() {
  const {profile,updateProfile,setProfile} = useAuth();
  const {add} = useToast();
  const nameRef = useRef(); const phoneRef = useRef(); const gradeRef = useRef(); const provRef = useRef(); const bioRef = useRef();
  const [saving,setSaving] = useState(false);
  const [avFile,setAvFile] = useState(null);
  const [uploading,setUploading] = useState(false);

  const save = async() => {
    setSaving(true);
    try {
      await updateProfile({
        name:nameRef.current?.value?.trim(),
        phone:phoneRef.current?.value?.trim(),
        grade:gradeRef.current?.value,
        province:provRef.current?.value,
        bio:bioRef.current?.value?.trim()
      });
      add({title:"✅ Profile saved!",icon:"👤",type:"i"});
    }catch(e){add({title:"Error",body:e.message,icon:"❌",type:"d"});}
    finally{setSaving(false);}
  };

  const uploadPic = async() => {
    if (!avFile) return;
    setUploading(true);
    try {
      const fd = new FormData(); fd.append("avatar",avFile);
      const d = await api("POST","/auth/avatar",null,tok(),fd);
      setProfile(d.user);
      add({title:"✅ Picture uploaded!",icon:"🖼️",type:"i"});
      setAvFile(null);
    }catch(e){add({title:"Upload failed",body:e.message,icon:"❌",type:"d"});}
    finally{setUploading(false);}
  };

  return (
    <div style={{maxWidth:500,margin:"0 auto",paddingBottom:30}}>
      <h2 style={{color:C.gd,marginBottom:16,fontSize:20}}>👤 My Profile</h2>
      <div style={CARD}>
        <div style={{textAlign:"center",marginBottom:22}}>
          <div style={{width:84,height:84,borderRadius:"50%",background:`linear-gradient(135deg,${C.gd},${C.g})`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:34,margin:"0 auto 12px",overflow:"hidden",boxShadow:"0 6px 24px rgba(6,77,44,0.3)"}}>
            {profile?.avatarUrl?<img src={profile.avatarUrl} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:(profile?.avatar||profile?.name?.[0]||"?")}
          </div>
          <div style={{marginBottom:8}}><input type="file" accept="image/*" onChange={e=>setAvFile(e.target.files[0])} style={{fontSize:12,color:C.gr}}/></div>
          {avFile&&<button type="button" style={{...Btn("p",true),fontSize:12}} onClick={uploadPic} disabled={uploading}>{uploading?"⏳ Uploading...":"📤 Upload to Cloudinary"}</button>}
        </div>
        {[["name","👤 Full Name",profile?.name||""],["phone","📱 Phone / WhatsApp",profile?.phone||""],["grade","🏫 Grade / Form",profile?.grade||""],["province","🗺️ Province",profile?.province||""]].map(([k,label,def])=>(
          <div key={k} style={{marginBottom:14}}>
            <label style={LBL}>{label}</label>
            <input ref={k==="name"?nameRef:k==="phone"?phoneRef:k==="grade"?gradeRef:provRef}
              style={INP} defaultValue={def}/>
          </div>
        ))}
        <div style={{marginBottom:18}}>
          <label style={LBL}>📝 Bio</label>
          <textarea ref={bioRef} style={{...INP,height:80,resize:"vertical"}} defaultValue={profile?.bio||""} placeholder="About yourself..."/>
        </div>
        <div style={{background:C.gp,borderRadius:12,padding:"12px 14px",marginBottom:18}}>
          <div style={{fontSize:12,color:C.gd,fontWeight:600,marginBottom:5}}>📋 Account Details</div>
          <div style={{fontSize:12,color:C.gr}}>📧 Email: <strong>{profile?.email}</strong></div>
          <div style={{fontSize:12,color:C.gr,marginTop:3}}>🎭 Role: <strong style={{textTransform:"capitalize"}}>{profile?.role}</strong></div>
          {profile?.role==="tutor"&&<div style={{fontSize:12,marginTop:3}}>✔️ Status: <strong style={{color:profile?.approved?C.ok:C.wa}}>{profile?.approved?"✅ Approved":"⏳ Pending Approval"}</strong></div>}
        </div>
        <button type="button" style={{...Btn(),width:"100%",fontSize:15}} onClick={save} disabled={saving}>{saving?"⏳ Saving...":"💾 Save Changes"}</button>
      </div>
    </div>
  );
}

function AssignmentsPage({subs,pays}) {
  const {profile} = useAuth();
  const {add} = useToast();
  const {data:asns,loading} = useApiData("/assignments");
  const {data:mysubs,refetch} = useApiData("/assignments/my-submissions",[profile?._id]);
  const [sub,setSub] = useState(null);
  const txtRef = useRef();
  const [fi,setFi] = useState(null);
  const [busy,setBusy] = useState(false);

  const doSub = async(a) => {
    const txt = txtRef.current?.value?.trim();
    if (!txt&&!fi) return;
    setBusy(true);
    try {
      const fd = new FormData();
      fd.append("content",txt||"");
      if(fi) fd.append("file",fi);
      await api("POST",`/assignments/${a._id}/submit`,null,tok(),fd);
      setSub(null); setFi(null); refetch();
      add({title:"✅ Submitted!",icon:"📝",type:"i"});
    }catch(e){add({title:"Failed",body:e.message,icon:"❌",type:"d"});}
    finally{setBusy(false);}
  };

  if (loading) return <Spin/>;
  return (
    <div style={{paddingBottom:20}}>
      <h2 style={{color:C.gd,marginBottom:14,fontSize:20}}>📝 Assignments</h2>
      {asns.length===0&&<div style={{textAlign:"center",padding:40,color:C.gr}}>No assignments yet</div>}
      {asns.map(a=>{
        const s=mysubs.find?mysubs.find(x=>x.assignment_id===a._id):null;
        const ok=isSub(subs,pays,a.subject_id);
        return (
          <div key={a._id} style={{...CARD,borderLeft:`4px solid ${s?s.status==="graded"?C.ok:C.wa:C.g}`}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10,flexWrap:"wrap",gap:8}}>
              <div>
                <div style={{fontWeight:700,fontSize:15}}>{a.title}</div>
                <div style={{fontSize:12,color:C.gr,marginTop:2}}>{si(a.subject_id)} {sn(a.subject_id)}{a.due_date&&` · Due: ${a.due_date}`}{a.max_marks&&` · ${a.max_marks} marks`}</div>
              </div>
              {s&&<span style={{background:s.status==="graded"?C.okl:C.wal,color:s.status==="graded"?C.ok:C.wa,borderRadius:20,padding:"4px 12px",fontSize:11,fontWeight:600,height:"fit-content"}}>{s.status==="graded"?`✓ Grade: ${s.grade||s.marks}`:"⏳ Submitted"}</span>}
            </div>
            {a.description&&<p style={{fontSize:13,color:C.grd,marginBottom:10,lineHeight:1.6}}>{a.description}</p>}
            {a.file_url&&<a href={a.file_url} target="_blank" rel="noreferrer" style={{fontSize:12,color:C.g,fontWeight:600,display:"block",marginBottom:8}}>📎 View assignment file</a>}
            {s?.feedback&&<div style={{background:C.gp,borderRadius:10,padding:"9px 13px",fontSize:12,color:C.gd,marginBottom:10}}>💬 Tutor feedback: {s.feedback}</div>}
            {!s&&ok&&(sub===a._id?(

function TestsPage({subs,pays}) {
  const {profile} = useAuth();
  const {add} = useToast();
  const {data:tests,loading} = useApiData("/tests");
  const {data:questions} = useApiData("/tests/questions");
  const {data:results,refetch} = useApiData("/tests/results",[profile?._id]);
  const [active,setActive] = useState(null);
  const [answers,setAnswers] = useState({});
  const [timeLeft,setTimeLeft] = useState(0);
  const [done,setDone] = useState(false);
  const timer = useRef(null);
  const ansRefs = useRef({});

  const start = test => { setActive(test); setAnswers({}); ansRefs.current={}; setDone(false); setTimeLeft(test.duration*60); };

  useEffect(()=>{
    if (!active||done) return;
    timer.current = setInterval(()=>setTimeLeft(t=>{if(t<=1){clearInterval(timer.current);submit();return 0;}return t-1;}),1000);
    return ()=>clearInterval(timer.current);
  },[active,done]);

  const submit = async() => {
    if (!active||done) return;
    clearInterval(timer.current); setDone(true);
    // Collect short answer values from refs
    const finalAnswers = {...answers};
    Object.keys(ansRefs.current).forEach(k=>{ if(ansRefs.current[k]) finalAnswers[k]=ansRefs.current[k].value||""; });
    try {
      await api("POST",`/tests/${active._id}/submit`,{answers:finalAnswers},tok());
      refetch(); add({title:"✅ Test Submitted!",body:"Results calculated",icon:"🎯",type:"i"});
      setTimeout(()=>{setActive(null);setDone(false);},2000);
    }catch(e){ add({title:"Error",body:e.message,icon:"⚠️",type:"w"}); setTimeout(()=>setActive(null),2000); }
  };

  if (active) {
    const qs = questions.filter(q=>q.test_id===active._id);
    const m = Math.floor(timeLeft/60).toString().padStart(2,"0");
    const s = (timeLeft%60).toString().padStart(2,"0");
    return (
      <div style={{maxWidth:640,paddingBottom:30}}>
        <div style={{background:`linear-gradient(135deg,${C.gd},${C.g})`,borderRadius:16,padding:"14px 18px",marginBottom:18,display:"flex",justifyContent:"space-between",alignItems:"center",color:"#fff",position:"sticky",top:0,zIndex:10}}>
          <div><div style={{fontWeight:700,fontSize:15}}>{active.title}</div><div style={{fontSize:11,opacity:.8}}>{qs.length} questions</div></div>
          <div style={{textAlign:"center"}}><div style={{fontSize:26,fontWeight:800,color:timeLeft<60?"#fca5a5":"#fff"}}>{m}:{s}</div><div style={{fontSize:10,opacity:.7}}>Time Left</div></div>
          <button type="button" style={{...Btn("d",true),fontSize:12}} onClick={submit} disabled={done}>{done?"⏳":"📤 Submit"}</button>
        </div>
        {qs.map((q,i)=>(
          <div key={q._id} style={CARD}>
            <div style={{fontWeight:600,fontSize:14,marginBottom:13,color:C.dk}}>Q{i+1}. {q.question}</div>
            {q.type==="mcq"&&q.options?.map(o=>(
              <label key={o} style={{display:"flex",alignItems:"center",gap:11,padding:"11px 14px",borderRadius:11,marginBottom:8,cursor:"pointer",border:`2px solid ${answers[q._id]===o?C.g:C.grl}`,background:answers[q._id]===o?C.gp:"#fff",transition:"all 0.15s",WebkitTapHighlightColor:"transparent"}}>
                <input type="radio" name={q._id} checked={answers[q._id]===o} onChange={()=>setAnswers(p=>({...p,[q._id]:o}))} style={{accentColor:C.g,width:18,height:18}}/>
                <span style={{fontSize:14}}>{o}</span>
              </label>
            ))}
            {q.type==="truefalse"&&["True","False"].map(o=>(
              <label key={o} style={{display:"flex",alignItems:"center",gap:11,padding:"11px 14px",borderRadius:11,marginBottom:8,cursor:"pointer",border:`2px solid ${answers[q._id]===o.toLowerCase()?C.g:C.grl}`,background:answers[q._id]===o.toLowerCase()?C.gp:"#fff",WebkitTapHighlightColor:"transparent"}}>
                <input type="radio" name={q._id} checked={answers[q._id]===o.toLowerCase()} onChange={()=>setAnswers(p=>({...p,[q._id]:o.toLowerCase()}))} style={{accentColor:C.g,width:18,height:18}}/>
                <span style={{fontSize:14,fontWeight:600}}>{o}</span>
              </label>
            ))}
            {q.type==="short"&&<input ref={el=>ansRefs.current[q._id]=el} style={INP} placeholder="Type your answer here..." defaultValue=""/>}
          </div>
        ))}
        <button type="button" style={{...Btn(),width:"100%",justifyContent:"center",fontSize:16,padding:"16px"}} onClick={submit} disabled={done}>{done?"⏳ Submitting...":"📤 Submit Test"}</button>
      </div>
    );
  }

  if (loading) return <Spin/>;
  return (
    <div style={{paddingBottom:20}}>
      <h2 style={{color:C.gd,marginBottom:14,fontSize:20}}>✏️ Tests & Quizzes</h2>
      {tests.length===0&&<div style={{textAlign:"center",padding:40,color:C.gr}}>No tests yet</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:14}}>
        {tests.map(t=>{
          const qs=questions.filter(q=>q.test_id===t._id);
          const ok=isSub(subs,pays,t.subject_id);
          const res=results.find?results.find(r=>r.test_id===t._id):null;
          const pct=res?.percent??null;
          return (
            <div key={t._id} style={{background:"#fff",borderRadius:16,padding:18,boxShadow:"0 2px 14px rgba(6,77,44,0.08)",border:`2px solid ${res?pct>=70?"#bbf7d0":pct>=50?"#fde68a":"#fecaca":"#eef3f1"}`,position:"relative"}}>
              {res&&<div style={{position:"absolute",top:12,right:12,background:pct>=70?C.okl:pct>=50?"#fef9e7":C.dl,color:pct>=70?C.ok:pct>=50?C.gold:C.d,borderRadius:10,padding:"6px 12px",fontWeight:800,fontSize:16}}>{pct}%</div>}
              <div style={{fontSize:34,marginBottom:8}}>{si(t.subject_id)}</div>
              <h3 style={{margin:"0 0 5px",color:C.gd,fontSize:14,paddingRight:res?60:0}}>{t.title}</h3>
              <div style={{fontSize:11,color:C.gr,marginBottom:13}}>{sn(t.subject_id)} · {qs.length} questions · {t.duration}min</div>
              {!ok?<span style={{fontSize:12,color:C.d,fontWeight:600}}>🔒 Subscribe to unlock</span>
                :res?<div style={{fontSize:13,color:pct>=50?C.ok:C.d,fontWeight:700}}>{res.score}/{res.total} correct · {pct>=50?"✅ Passed":"❌ Failed"}</div>
                :<button type="button" style={{...Btn("p",true),width:"100%",justifyContent:"center",fontSize:14}} onClick={()=>start(t)}>▶ Start Test</button>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function SubscribePage() {
  const {profile} = useAuth(); const {add} = useToast();
  const {data:subs} = useApiData("/subscriptions/mine",[profile?._id]);
  const {data:pays,refetch} = useApiData("/subscriptions/payments/mine",[profile?._id]);
  const [sel,setSel] = useState([]);
  const [method,setMethod] = useState("mtn");
  const [months,setMonths] = useState(1);
  const [busy,setBusy] = useState(false);
  const txnRef = useRef();
  const notesRef = useRef();
  const [receipt,setReceipt] = useState(null);
  const actIds = new Set([...subs.filter(s=>s.payment_status==="approved"&&s.status==="active").map(s=>Number(s.subject_id)),...pays.filter(p=>p.status==="approved").map(p=>Number(p.subject_id))]);
  const pendIds = new Set(pays.filter(p=>p.status==="pending").map(p=>Number(p.subject_id)));
  const toggle = id => setSel(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const price = 85;

  const submit = async() => {
    const txn = txnRef.current?.value?.trim();
    if (!sel.length||!txn) { add({title:"Missing info",body:"Select subjects and enter transaction ID",icon:"⚠️",type:"w"}); return; }
    setBusy(true);
    try {
      for (const sid of sel) {
        const fd = new FormData();
        fd.append("subject_id",sid); fd.append("amount",price*months);
        fd.append("months",months); fd.append("method",method);
        fd.append("transaction_id",txn);
        const notes = notesRef.current?.value?.trim();
        if (notes) fd.append("notes",notes);
        if (receipt) fd.append("receipt",receipt);
        await api("POST","/subscriptions/payment",null,tok(),fd);
      }
      add({title:"✅ Payment submitted!",body:"Admin will verify. WhatsApp 0772799672 to speed up!",icon:"💳",type:"i"});
      setSel([]); setReceipt(null); refetch();

            <div style={{fontWeight:700,fontSize:14,color:C.g}}>{p.num}</div>

      </div>
      {actIds.size>0&&<div style={{...CARD,marginBottom:14}}><h3 style={{color:C.gd,margin:"0 0 10px",fontSize:14}}>✅ Your Active Subscriptions</h3><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{[...actIds].map(id=>{const s=SUBJECTS.find(x=>x.id===id);return s?<span key={id} style={{background:C.okl,color:C.ok,borderRadius:20,padding:"4px 12px",fontSize:12,fontWeight:600}}>{s.i} {s.n}</span>:null;})}</div></div>}

  return <Layout nav={nav} active={an} setActive={setAn}>{an==="profile"?<ProfilePage/>:<AdminDash/>}</Layout>;
}
function AdminDash() {
  const {data:users} = useApiData("/users");
  const {data:pays} = useApiData("/subscriptions/payments/all");
  const pending = pays.filter(p=>p.status==="pending");
  const rev = pays.filter(p=>p.status==="approved").reduce((a,b)=>a+(b.amount||0),0);
  return (
    <div style={{paddingBottom:20}}>
      <div style={{background:`linear-gradient(135deg,${C.gd},${C.g})`,borderRadius:22,padding:"24px",marginBottom:18,color:"#fff"}}>
        <div style={{fontSize:36,marginBottom:10}}>🏫</div>
        <h2 style={{margin:"0 0 4px",fontSize:22,fontFamily:"'Playfair Display',serif"}}>Admin Dashboard</h2>
        <p style={{margin:0,opacity:.85,fontSize:13}}>Peace Mindset Private School · KEN MEDIA CREATIVE 🇿🇲</p>
        {pending.length>0&&<div style={{marginTop:12,background:"rgba(220,38,38,0.3)",borderRadius:10,padding:"10px 14px",fontSize:14,fontWeight:700}}>🔴 {pending.length} payment{pending.length!==1?"s":""} awaiting approval!</div>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))",gap:10,marginBottom:18}}>
        {[["🎓","Students",users.filter(u=>u.role==="student").length,C.g],["📚","Tutors",users.filter(u=>u.role==="tutor").length,C.gold],["💳","Pending",pending.length,pending.length>0?C.d:C.ok],["💰","Revenue",`ZMW ${rev}`,C.ok]].map(([ic,lb,vl,co])=>(
          <div key={lb} style={{background:"#fff",borderRadius:14,padding:"14px 10px",textAlign:"center",boxShadow:"0 2px 10px rgba(0,0,0,0.06)"}}>
            <div style={{fontSize:22}}>{ic}</div><div style={{fontSize:18,fontWeight:700,color:co,marginTop:4,fontFamily:"'Playfair Display',serif"}}>{vl}</div><div style={{fontSize:10,color:C.gr,marginTop:2}}>{lb}</div>
          </div>
        ))}
      </div>
      {pending.length>0&&(
        <div style={CARD}>
          <h3 style={{color:C.d,margin:"0 0 14px",fontSize:15}}>🔴 Pending Payments</h3>
          {pending.slice(0,5).map(p=>(
            <div key={p._id} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:`1px solid ${C.grl}`,gap:8}}>
              <div><div style={{fontWeight:600,fontSize:14}}>{p.student_id?.name||"Student"}</div><div style={{fontSize:11,color:C.gr}}>{sn(p.subject_id)} · ZMW {p.amount} · {p.method}</div></div>
              <span style={{background:C.wal,color:C.wa,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:600,flexShrink:0}}>⏳ Pending</span>
            </div>
          ))}
          <div style={{marginTop:12,fontSize:13,color:C.grd,fontWeight:600}}>→ To approve payments, use the Termux server running on your phone. WhatsApp 0772799672</div>
        </div>
      )}
    </div>
  );
}

// ── MAIN APP ───────────────────────────────────────────
function AppInner() {
  const {profile,loading} = useAuth();
  if (loading) return (
    <div style={{height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:`linear-gradient(160deg,${C.gd},#085e35,${C.gl})`}}>
      <div style={{width:88,height:88,borderRadius:26,background:`linear-gradient(135deg,#8a6200,${C.gold},#f0b429)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:42,marginBottom:22,boxShadow:"0 12px 40px rgba(201,147,10,0.5)",animation:"breathe 2s ease-in-out infinite"}}>🎓</div>
      <div style={{color:"#fff",fontSize:20,fontWeight:800,marginBottom:5,fontFamily:"'Playfair Display',serif",letterSpacing:"1px"}}>PEACE MINDSET</div>
      <div style={{color:"rgba(255,255,255,0.7)",fontSize:12,letterSpacing:"2px",textTransform:"uppercase",marginBottom:30}}>Private School · GCE Online · Zambia 🇿🇲</div>
      <div style={{width:40,height:40,border:"3px solid rgba(255,255,255,0.2)",borderTop:"3px solid #fff",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <div style={{color:"rgba(255,255,255,0.5)",fontSize:12,marginTop:20}}>Connecting to server...</div>
    </div>
  );
  if (!profile) return <AuthScreen/>;
  if (profile.role==="admin") return <AdminApp/>;
  if (profile.role==="tutor") {
    if (!profile.approved) return (
      <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:`linear-gradient(160deg,${C.gd},${C.g})`,padding:16}}>
        <div style={{background:"#fff",borderRadius:24,padding:"44px 36px",textAlign:"center",maxWidth:380,boxShadow:"0 24px 80px rgba(0,0,0,0.3)"}}>
          <div style={{fontSize:68,marginBottom:16}}>⏳</div>
          <h2 style={{color:C.gd,marginBottom:12,fontSize:22}}>Awaiting Admin Approval</h2>
          <p style={{color:C.gr,fontSize:14,lineHeight:1.7}}>Your tutor account is being reviewed. You'll be notified once approved.</p>
          <div style={{background:C.gp,borderRadius:12,padding:"14px 16px",marginTop:20}}>
            <p style={{color:C.gd,fontSize:14,margin:0,fontWeight:600}}>📱 WhatsApp admin now:</p>
            <p style={{color:C.g,fontSize:18,margin:"6px 0 0",fontWeight:800}}>0772799672</p>
            <p style={{color:C.gr,fontSize:12,margin:"4px 0 0"}}>Tell them your name and email!</p>
          </div>
        </div>
      </div>
    );
    return <TutorApp/>;
  }
  return <StudentApp/>;
}

function App() {
  return (
    <AuthProvider>
      <ToastProvider>
        <AppInner/>
      </ToastProvider>
    </AuthProvider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
