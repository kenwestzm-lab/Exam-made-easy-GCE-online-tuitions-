/* ── ZAMBIAN AI TUTOR VOICE ENGINE ─────────────────────────── */
const ZambianVoice = {
  _queue: [],
  _speaking: false,
  _voices: [],
  _ready: false,
  init() {
    if (!window.speechSynthesis) return;
    const load = () => {
      this._voices = window.speechSynthesis.getVoices();
      if (this._voices.length) this._ready = true;
    };
    load();
    window.speechSynthesis.onvoiceschanged = load;
    setTimeout(load, 800);
    setTimeout(load, 2000);
  },
  pickVoice(gender = 'male') {
    if (!this._ready) {
      this._voices = window.speechSynthesis.getVoices();
    }
    const hints = gender === 'female' ? ['zira', 'hazel', 'susan', 'karen', 'victoria', 'samantha', 'female'] : ['daniel', 'david', 'mark', 'james', 'george', 'oliver', 'male'];
    for (const h of hints) {
      const v = this._voices.find(v => v.name.toLowerCase().includes(h));
      if (v) return v;
    }
    return this._voices.find(v => v.lang === 'en-ZA') || this._voices.find(v => v.lang === 'en-GB') || this._voices.find(v => v.lang.startsWith('en')) || this._voices[0] || null;
  },
  speak(text, gender = 'male', rate = null, onEnd = null) {
    if (!window.speechSynthesis || !text?.trim()) {
      if (onEnd) onEnd();
      return;
    }

      text: text.trim(),
      gender,
      rate,
      onEnd
    });
    if (!this._speaking) this._process();
  },
  _process() {
    if (!this._queue.length) {
      this._speaking = false;
      return;
    }
    this._speaking = true;
    const {
      text,
      gender,
      rate,
      onEnd
    } = this._queue.shift();
    try {
      window.speechSynthesis.cancel();
    } catch (e) {}
    const utt = new SpeechSynthesisUtterance(text);
    utt.rate = rate || (gender === 'female' ? 0.75 : 0.78);
    utt.pitch = gender === 'female' ? 1.1 : 0.9;
    utt.volume = 1.0;
    utt.lang = 'en-GB';
    const v = this.pickVoice(gender);
    if (v) utt.voice = v;
    utt.onend = () => {
      if (onEnd) setTimeout(onEnd, 200);
      this._process();
    };
    utt.onerror = e => {
      if (onEnd && e.error !== 'interrupted') onEnd();
      this._process();
    };
    setTimeout(() => {
      try {
        window.speechSynthesis.speak(utt);
      } catch (e) {
        this._process();
      }
    }, 100);
  },
  stop() {
    this._queue = [];
    this._speaking = false;
    try {
      window.speechSynthesis.cancel();
    } catch (e) {}
  },
  isSpeaking() {
    return this._speaking;
  }
};

function LiveClassRoom({classData,onExit,profile,socket}){

  const [breath,setBreath]=useState(1);

  const [scanImg,setScanImg]=useState(false);
  const [lessonReady,setLessonReady]=useState(false);

  const addMsg=useCallback((role,text,meta={})=>{

  const processSpk=useCallback(()=>{
    if(isspk.current||!spkQ.current.length)return;
    const{text,cb}=spkQ.current.shift();
    isspk.current=true;setAiSpk(true);
    addMsg('ai',text);
    if(socket&&classData?._id)socket.emit('ai_speaking',{classId:classData._id,text,character:ck});

      isspk.current=false;setAiSpk(false);

      if(cb)cb();else setTimeout(processSpk,400);

  const say=useCallback((text,cb=null)=>{
    if(!text?.trim())return;

  const askQuestion=useCallback((question)=>{

      // Wait 20 seconds for student answer before continuing

      },20000);
    });

          try{

function ChatPage() {
  const { profile, socket } = useAuth();

  const [srch, setSrch] = useState('');
  const [mediaFile, setMediaFile] = useState(null);
  const [mediaPreview, setMediaPreview] = useState(null);
  const [unread, setUnread] = useState({});
  const [lastMsg, setLastMsg] = useState({});
  const [recording, setRecording] = useState(false);
  const [ctxMenu, setCtxMenu] = useState(null);
  const [replyTo, setReplyTo] = useState(null);
  const longPressTimer = useRef(null);
  const [audioBlob, setAudioBlob] = useState(null);
  const [showMenu, setShowMenu] = useState(false);
  const [showNewGroup, setShowNewGroup] = useState(false);
  const [onlineUsers, setOnlineUsers] = useState(new Set());
  const [showSettings, setShowSettings] = useState(false);
  const [showGroupInfo, setShowGroupInfo] = useState(false);
  const [myGroups, setMyGroups] = useState([]);
  const [ngName, setNgName] = useState('');
  const [ngBio, setNgBio] = useState('');
  const [ngPicks, setNgPicks] = useState([]);
  const [ngBusy, setNgBusy] = useState(false);
  const [ngErr, setNgErr] = useState('');
  const [ngPhoto, setNgPhoto] = useState(null);
  const [notifOn, setNotifOn] = useState(true);
  const [blocked, setBlocked] = useState([]);
  const [settsBusy, setSettsBusy] = useState(false);
  const [recSecs, setRecSecs] = useState(0);
  const [waveVals, setWaveVals] = useState([4,8,5,10,6,9,4,7,5,8]);
  const cRef = useRef();
  const mediaRec = useRef(null);
  const audioChunks = useRef([]);
  const recTimer = useRef(null);

  const others = users.filter(u => u._id !== profile?._id);
  const subjectGroups = [{id:0,n:'General Chat',i:'school'}, ...SUBJECTS.map(s=>({id:s.id,n:s.n,i:s.i}))];
  const groups = [
    ...subjectGroups,
    ...myGroups.map(g => ({id: g._id, n: g.name, i: 'custom', _custom: true, _data: g}))
  ];

  // Load custom groups + seed lastMsg + online users on mount
  useEffect(() => {
    if (!profile) return;
    apiFetch('GET', '/groups', null, tok()).then(d => {
      if (Array.isArray(d)) setMyGroups(d);
    }).catch(() => {});
    // Seed online users
    apiFetch('GET', '/users', null, tok()).then(d => {
      if (Array.isArray(d)) {
        const online = new Set(d.filter(u=>u.is_online).map(u=>u._id));
        setOnlineUsers(online);
      }
    }).catch(() => {});
    apiFetch('GET', '/messages/recent', null, tok()).then(d => {
      if (!Array.isArray(d)) return;
      const myId = profile._id?.toString();
      const msgMap = {};
      const unreadMap = {};
      d.forEach(m => {
        const sid = m.sender_id?.toString ? m.sender_id.toString() : m.sender_id;
        const rid = m.receiver_id?.toString ? m.receiver_id.toString() : m.receiver_id;
        const otherId = sid === myId ? rid : sid;
        if (!msgMap[otherId]) msgMap[otherId] = {text: m.image_url ? (m.content||'Voice message') : (m.content||''), time: m.createdAt};
        if (rid === myId && m.is_read !== true) {
          unreadMap[sid] = (unreadMap[sid]||0) + 1;
        }
      });
      setLastMsg(p => ({...p, ...msgMap}));
      setUnread(p => ({...p, ...unreadMap}));
    }).catch(() => {});
  }, [profile?._id]);

  // Listen for real-time group events
  useEffect(() => {
    if (!socket) return;
    const onCreated = g => setMyGroups(p => [g, ...p.filter(x => x._id !== g._id)]);
    const onUpdated = g => setMyGroups(p => p.map(x => x._id === g._id ? g : x));
    const onDeleted = ({groupId}) => setMyGroups(p => p.filter(x => x._id !== groupId));
    socket.on('group_created', onCreated);
    socket.on('group_updated', onUpdated);
    socket.on('group_deleted', onDeleted);
    return () => {
      socket.off('group_created', onCreated);
      socket.off('group_updated', onUpdated);
      socket.off('group_deleted', onDeleted);
    };
  }, [socket]);

  // Real-time messages
  useEffect(() => {
    if (!socket) return;
    const onDirect = msg => {
      const relevant = tab==='direct' && sel && (msg.receiver_id===sel._id || msg.sender_id===sel._id);
      const otherId = msg.sender_id === profile?._id ? msg.receiver_id : msg.sender_id;
      setLastMsg(p => ({...p, [otherId]: {text: msg.content||'📎 Media', time: msg.createdAt}}));
      if (relevant) {
        setMsgs(p => p.find(m=>m._id===msg._id) ? p : [...p, msg]);
        setTimeout(() => cRef.current?.scrollTo(0,99999), 100);
      } else if (msg.sender_id !== profile?._id) {
        setUnread(p => ({...p, [msg.sender_id]: (p[msg.sender_id]||0)+1}));
      }
    };
    const onGroup = msg => {
      const relevant = tab==='group' && msg.subject_id===selG;
      setLastMsg(p => ({...p, ['g'+msg.subject_id]: {text: msg.content||'📎 Media', time: msg.createdAt}}));
      if (relevant) {
        setMsgs(p => p.find(m=>m._id===msg._id) ? p : [...p, msg]);
        setTimeout(() => cRef.current?.scrollTo(0,99999), 100);
      } else if (msg.sender_id !== profile?._id) {
        setUnread(p => ({...p, ['g'+msg.subject_id]: (p['g'+msg.subject_id]||0)+1}));
      }
    };
    const onCustomGroup = msg => {
      const relevant = tab==='group' && selG===msg.group_id;
      if (relevant) {
        setMsgs(p => p.find(m=>m._id===msg._id) ? p : [...p, msg]);
        setTimeout(() => cRef.current?.scrollTo(0,99999), 100);
      } else if (msg.sender_id !== profile?._id) {
        setUnread(p => ({...p, ['cg'+msg.group_id]: (p['cg'+msg.group_id]||0)+1}));
      }
    };
    const onRead = ({by, from}) => {
      setMsgs(p => p.map(m => m.sender_id===profile?._id && m.receiver_id===by ? {...m, is_read:true} : m));
    };
    const onDeleted = ({_id}) => {
      setMsgs(p => p.filter(m => m._id !== _id));
    };
    const onOnline = ({userId}) => setOnlineUsers(p => new Set([...p, userId]));
    const onOffline = ({userId}) => setOnlineUsers(p => { const n = new Set(p); n.delete(userId); return n; });
    socket.on('new_direct_message', onDirect);
    socket.on('new_group_message', onGroup);
    socket.on('new_custom_group_message', onCustomGroup);
    socket.on('messages_read', onRead);
    socket.on('message_deleted', onDeleted);
    socket.on('user_online', onOnline);
    socket.on('user_offline', onOffline);
    return () => { socket.off('new_direct_message', onDirect); socket.off('new_group_message', onGroup); socket.off('new_custom_group_message', onCustomGroup); socket.off('messages_read', onRead); socket.off('message_deleted', onDeleted); socket.off('user_online', onOnline); socket.off('user_offline', onOffline); };
  }, [socket, sel, selG, tab, profile]);

  // Join group rooms
  useEffect(() => {
    if (!socket || !profile) return;
    socket.emit('join_user', profile._id);
    groups.forEach(g => socket.emit('join_group', g.id));

    myGroups.forEach(g => socket.emit('join_custom_group', g._id));
  }, [socket, profile, myGroups]);

  useEffect(() => {
    if (sel===null && selG===null) return;
    (async () => {
      try {
        const isCustom = tab==='group' && typeof selG==='string' && selG.length===24;
        const path = tab==='direct' ? '/messages/direct/'+sel?._id : isCustom ? '/messages/custom-group/'+selG : '/messages/group/'+selG;
        const d = await apiFetch('GET', path, null, tok());
        const msgs = Array.isArray(d) ? d : [];
        setMsgs(msgs);
        // Update lastMsg from history
        if (msgs.length > 0) {
          const last = msgs[msgs.length-1];
          const key = tab==='direct' ? sel?._id : (typeof selG==='string'&&selG.length===24?'cg'+selG:'g'+selG);
          setLastMsg(p=>({...p,[key]:{text:last.image_url?(last.content||'Voice message'):last.content||'',time:last.createdAt}}));
        }
        // Mark as read + clear unread badge
        const key = tab==='direct' ? sel?._id : 'g'+selG;
        setUnread(p => ({...p, [key]: 0}));
        if (tab==='direct' && sel?._id) {
          apiFetch('PUT', '/messages/direct/'+sel._id+'/read', null, tok()).catch(()=>{});
        }
        setTimeout(() => cRef.current?.scrollTo(0,99999), 200);
      } catch(e) { setMsgs([]); }
    })();
  }, [sel, selG, tab]);

  const send = async () => {
    const text = input.trim();
    const curMedia = mediaFile;
    const curAudio = audioBlob;
    const curPreview = mediaPreview;
    if (!text && !curMedia && !curAudio) return;
    setInput(''); setMediaFile(null); setMediaPreview(null); setAudioBlob(null);
    const tempId = 'tmp_'+Date.now();
    const temp = {_id:tempId,sender_id:profile?._id,content:text,image_url:curPreview,createdAt:new Date().toISOString(),_pending:true};
    setMsgs(p=>[...p,temp]);
    setTimeout(()=>cRef.current?.scrollTo(0,99999),80);
    try {
      const fd = new FormData();
      const isCustomGroup = tab==='group' && typeof selG==='string' && selG.length===24;
      if (tab==='direct' && sel) fd.append('receiver_id', sel._id);
      if (tab==='group' && !isCustomGroup && selG!==null) fd.append('subject_id', selG);
      if (isCustomGroup) fd.append('group_id', selG);
      if (text) fd.append('content', text);
      if (curMedia) fd.append('image', curMedia);
      if (curAudio) {

      }
      const path = tab==='direct' ? '/messages/direct' : isCustomGroup ? '/messages/custom-group' : '/messages/group';
      const r = await fetch(BACKEND+'/api'+path, {method:'POST', headers:{Authorization:'Bearer '+tok()}, body:fd});
      const saved = await r.json().catch(()=>null);
      if (saved?._id) {
        setMsgs(p=>p.map(m=>m._id===tempId?saved:m));
        const lkey = tab==='direct'?sel?._id:(typeof selG==='string'&&selG.length===24?'cg'+selG:'g'+selG);
        setLastMsg(p=>({...p,[lkey]:{text:saved.image_url?(saved.content||'Voice message'):saved.content||'',time:saved.createdAt}}));
      } else setMsgs(p=>p.filter(m=>m._id!==tempId));
