const {useState,useEffect,useRef,useCallback,createContext,useContext} = React;

// ── BACKEND ────────────────────────────────────────────────────
const BACKEND = 'https://peace-mindset-api.onrender.com';

const apiFetch = async (method, path, body, token, fd) => {
  try {
    const o = {method, headers:{}};
    if (token) o.headers['Authorization'] = `Bearer ${token}`;
    if (body && !fd) { o.headers['Content-Type']='application/json'; o.body=JSON.stringify(body); }
    else if (fd) o.body = fd;
    const r = await fetch(`${BACKEND}/api${path}`, o);
    const d = await r.json().catch(()=>({}));
    if (!r.ok) throw new Error(d.error || `Server error ${r.status}`);
    return d;
  } catch(e) {
    if (e.message.includes('fetch')||e.message.includes('Failed to fetch')) {
      throw new Error('Cannot connect. Server is waking up — please wait 30 seconds and try again.');
    }
    throw e;
  }
};

// ── NATURAL ZAMBIAN VOICE TTS ─────────────────────────────────
// Loads voices and picks best natural human-sounding voice
let _voicesLoaded = false;
let _voices = [];
const loadVoices = () => {
  _voices = window.speechSynthesis.getVoices();
  if (_voices.length > 0) _voicesLoaded = true;
};
if (window.speechSynthesis) {
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

const getBestVoice = (charKey) => {
  if (!_voicesLoaded) loadVoices();
  const vv = _voices;
  const isKen = charKey !== 'msimbi';
  
  // Priority 1: Natural sounding African/Southern African voices
  const africanVoices = vv.filter(v =>
    v.lang.includes('en-ZA') || v.lang.includes('en-GB') ||
    v.name.toLowerCase().includes('south africa') ||
    v.name.toLowerCase().includes('zambia')
  );
  
  // Priority 2: Natural male/female voices
  const genderedVoices = vv.filter(v => {
    const n = v.name.toLowerCase();
    return isKen
      ? (n.includes('male') || n.includes('david') || n.includes('mark') || n.includes('james') || n.includes('george') || n.includes('daniel') || n.includes('oliver'))
      : (n.includes('female') || n.includes('zira') || n.includes('hazel') || n.includes('susan') || n.includes('kate') || n.includes('victoria') || n.includes('samantha') || n.includes('karen'));
  });
  
  // Priority 3: English voices
  const englishVoices = vv.filter(v => v.lang.startsWith('en'));
  
  return africanVoices[0] || genderedVoices[0] || englishVoices[0] || vv[0] || null;
};

const speak = (text, charKey='ken', customRate, onEnd) => {
  if (!window.speechSynthesis || !text) return;
  window.speechSynthesis.cancel();
  const ch = AI_CHARS[charKey];
  
  let naturalText = text;
  
  const utt = new SpeechSynthesisUtterance(naturalText);
  
  // Natural Zambian English settings:
  // Slightly slower than normal, warm pitch, clear pronunciation
  utt.rate = customRate || (charKey === 'msimbi' ? 0.78 : 0.80); // natural teaching pace
  utt.pitch = charKey === 'msimbi' ? 1.08 : 0.92;                // warm, natural pitch
  utt.volume = 1.0;
  utt.lang = 'en-GB'; // closest to Southern African English
  
  const voice = getBestVoice(charKey);
  if (voice) utt.voice = voice;
  
  // Natural delivery: slight variation
  utt.onstart = () => {};
  if (onEnd) utt.onend = onEnd;
  utt.onerror = (e) => { if (onEnd && e.error !== 'interrupted') onEnd(); };
  
  // Small delay before speaking — feels more natural
  setTimeout(() => {
    try { window.speechSynthesis.speak(utt); } catch(e) { if(onEnd) onEnd(); }
  }, 150);
};

const stopSpeaking = () => { 
  try { window.speechSynthesis?.cancel(); } catch(e){} 
};

// ── AUTH CONTEXT ───────────────────────────────────────────────
const AuthCtx = createContext(null);
function AuthProvider({children}) {
  const [profile,setProfile] = useState(null);
  const [loading,setLoading] = useState(true);
  const [socket,setSocket] = useState(null);

  useEffect(()=>{
    const t = tok();
    if (!t) { setLoading(false); document.body.className='auth-mode'; return; }
    apiFetch('GET','/auth/me',null,t)
      .then(u => { setProfile(u); document.body.className='app-mode'; initSocket(u._id); })
      .catch(()=>{ localStorage.removeItem('pms_t'); document.body.className='auth-mode'; })
      .finally(()=>setLoading(false));
  },[]);

  const initSocket = (uid) => {
    const s = io(BACKEND, { query:{userId:uid}, transports:['websocket','polling'], reconnection:true });
    s.on('connect',()=>console.log('🔌 Socket connected'));
    s.on('disconnect',()=>console.log('🔌 Socket disconnected'));
    setSocket(s);
    return s;
  };

  const signIn = async(email,pw) => {
    const d = await apiFetch('POST','/auth/login',{email:email.trim().toLowerCase(),password:pw});
    localStorage.setItem('pms_t',d.token);
    setProfile(d.user);
    document.body.className='app-mode';
    initSocket(d.user._id);
    return d.user;
  };
  const signUp = async(form) => {
    const d = await apiFetch('POST','/auth/register',{...form,email:form.email.trim().toLowerCase()});
    localStorage.setItem('pms_t',d.token);
    setProfile(d.user);
    if (form.role!=='tutor') { document.body.className='app-mode'; initSocket(d.user._id); }
    return d.user;
  };
  const signOut = () => {
    localStorage.removeItem('pms_t');
    socket?.disconnect(); setSocket(null); setProfile(null);
    document.body.className='auth-mode';
  };
  const updateProfile = async(u) => {
    const d = await apiFetch('PUT','/auth/profile',u,tok()); setProfile(d); return d;
  };
  return <AuthCtx.Provider value={{profile,loading,socket,signIn,signUp,signOut,updateProfile,setProfile}}>{children}</AuthCtx.Provider>;
}
const useAuth = () => useContext(AuthCtx);

// ── TOAST ──────────────────────────────────────────────────────
const ToastCtx = createContext(null);
function ToastProvider({children}) {
  const [ts,setTs] = useState([]);
  const add = useCallback(({title,body,icon='🔔',type='i'})=>{
    const id = Date.now()+Math.random();

  const bg=t=>({m:`linear-gradient(135deg,${C.gd},${C.g})`,w:`linear-gradient(135deg,#92400e,${C.gold})`,i:'linear-gradient(135deg,#1e3a8a,#3b82f6)',d:`linear-gradient(135deg,#7f1d1d,${C.d})`})[t]||`linear-gradient(135deg,${C.gd},${C.g})`;
  return (
    <ToastCtx.Provider value={{add}}>
      {children}
      <div style={{position:'fixed',top:16,right:14,zIndex:99999,display:'flex',flexDirection:'column',gap:8,maxWidth:320,width:'calc(100vw - 28px)'}}>
        {ts.map(t=>(
          <div key={t.id} onClick={()=>setTs(p=>p.filter(x=>x.id!==t.id))}
            style={{background:bg(t.type),color:'#fff',borderRadius:16,padding:'13px 16px',boxShadow:'0 8px 32px rgba(0,0,0,0.25)',display:'flex',gap:10,alignItems:'flex-start',animation:'fadeUp 0.3s ease',cursor:'pointer'}}>
            <span style={{fontSize:20,flexShrink:0}}>{t.icon}</span>
            <div><div style={{fontWeight:700,fontSize:13}}>{t.title}</div>{t.body&&<div style={{fontSize:11,opacity:.9,marginTop:2,lineHeight:1.4}}>{t.body}</div>}</div>
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}
const useToast = () => useContext(ToastCtx);
const Spin=({s=36})=><div style={{display:'flex',justifyContent:'center',padding:36}}><div style={{width:s,height:s,border:'3px solid #edf7f2',borderTop:`3px solid ${C.g}`,borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/></div>;
function useApiData(path,deps=[]) {
  const [data,setData]=useState([]); const [loading,setLoading]=useState(true);
  const load=useCallback(async()=>{
    const t=tok(); if(!t) return;
    try{const d=await apiFetch('GET',path,null,t); setData(Array.isArray(d)?d:d);}
    catch(e){console.warn(path,e.message);}
    finally{setLoading(false);}
  },[path,...deps]);
  useEffect(()=>{load();},[load]);
  return {data,setData,loading,refetch:load};
}

// ── WHITEBOARD COMPONENT ───────────────────────────────────────
function Whiteboard({classId,socket,isPresenter,aiTextQueue,onAIWrite}) {
  const canvasRef=useRef(); const [tool,setTool]=useState('pen'); const [color,setColor]=useState('#000000'); const [size,setSize]=useState(3);
  const [drawing,setDrawing]=useState(false); const lastPos=useRef(null); const strokes=useRef([]);
  const [currentStroke,setCurrentStroke]=useState(null);

  const getPos=(e)=>{
    const canvas=canvasRef.current; const rect=canvas.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    return {x:(src.clientX-rect.left)*(canvas.width/rect.width),y:(src.clientY-rect.top)*(canvas.height/rect.height)};
  };

  useEffect(()=>{
    const canvas=canvasRef.current; if(!canvas)return;
    canvas.width=canvas.offsetWidth*window.devicePixelRatio||canvas.offsetWidth;
    canvas.height=canvas.offsetHeight*window.devicePixelRatio||canvas.offsetHeight;
    const ctx=canvas.getContext('2d');
    ctx.scale(window.devicePixelRatio||1,window.devicePixelRatio||1);
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
  },[]);

  const redraw=useCallback(()=>{
    const canvas=canvasRef.current; if(!canvas)return;
    const ctx=canvas.getContext('2d');
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width/window.devicePixelRatio,canvas.height/window.devicePixelRatio);
    strokes.current.forEach(s=>{
      if(s.type==='text'){
        ctx.font=`${s.size||18}px 'DM Sans'`; ctx.fillStyle=s.color||'#000';
        ctx.fillText(s.text,s.x,s.y);
      } else {
        ctx.beginPath(); ctx.strokeStyle=s.color||'#000'; ctx.lineWidth=s.size||3; ctx.lineCap='round'; ctx.lineJoin='round';
        s.points?.forEach((p,i)=>{if(i===0)ctx.moveTo(p.x,p.y);else ctx.lineTo(p.x,p.y);});
        ctx.stroke();
      }
    });
  },[]);

  // AI writes text on board
  useEffect(()=>{
    if(!aiTextQueue||!aiTextQueue.length)return;
    const canvas=canvasRef.current; if(!canvas)return;
    const ctx=canvas.getContext('2d');
    const text=aiTextQueue[aiTextQueue.length-1];
    const y=50+strokes.current.filter(s=>s.type==='text').length*30;
    const stroke={type:'text',text,x:20,y,color:'#1a1a2e',size:18};
    strokes.current.push(stroke);
    redraw();
    if(isPresenter&&socket&&classId){
      socket.emit('whiteboard_stroke',{classId,stroke});
    }
  },[aiTextQueue]);

  useEffect(()=>{
    if(!socket)return;
    const onStroke=(s)=>{
      strokes.current.push(s); redraw();
    };
    const onClear=()=>{strokes.current=[];redraw();};
    const onSync=({strokes:ss})=>{strokes.current=ss||[];redraw();};
    socket.on('whiteboard_stroke',onStroke);
    socket.on('whiteboard_clear',onClear);
    socket.on('whiteboard_full_sync',onSync);
    // Fetch existing strokes
    if(classId){
      apiFetch('GET',`/live-classes/${classId}/whiteboard`,null,tok())
        .then(d=>{strokes.current=d.strokes||[];redraw();}).catch(()=>{});
    }
    return()=>{socket.off('whiteboard_stroke',onStroke);socket.off('whiteboard_clear',onClear);socket.off('whiteboard_full_sync',onSync);};
  },[socket,classId]);

  const startDraw=(e)=>{
    if(!isPresenter)return; e.preventDefault();
    setDrawing(true); const p=getPos(e); lastPos.current=p;
    setCurrentStroke({type:'stroke',points:[p],color:tool==='eraser'?'#fff':color,size:tool==='eraser'?20:size});
  };
  const draw=(e)=>{
    if(!drawing||!isPresenter)return; e.preventDefault();
    const canvas=canvasRef.current; const ctx=canvas.getContext('2d'); const p=getPos(e);
    ctx.beginPath(); ctx.strokeStyle=tool==='eraser'?'#fff':color; ctx.lineWidth=tool==='eraser'?20:size;
    ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.moveTo(lastPos.current.x,lastPos.current.y); ctx.lineTo(p.x,p.y); ctx.stroke();
    setCurrentStroke(prev=>({...prev,points:[...(prev?.points||[]),p]}));
    if(socket&&classId){
      socket.emit('whiteboard_stroke',{classId,stroke:{type:'line',from:lastPos.current,to:p,color:tool==='eraser'?'#fff':color,size:tool==='eraser'?20:size}});
    }
    lastPos.current=p;
  };
  const endDraw=()=>{
    if(!drawing)return; setDrawing(false);
    if(currentStroke){strokes.current.push(currentStroke);setCurrentStroke(null);}
  };

  const clearBoard=()=>{
    strokes.current=[]; redraw();
    if(socket&&classId){socket.emit('whiteboard_clear',{classId});}
    if(classId){apiFetch('POST',`/live-classes/${classId}/whiteboard`,{strokes:[]},tok()).catch(()=>{});}
  };

  const addText=()=>{
    const text=prompt('Type text to write on board:'); if(!text)return;
    const y=50+(strokes.current.filter(s=>s.type==='text').length*30);
    const s={type:'text',text,x:20,y,color,size:18};
    strokes.current.push(s); redraw();
    if(socket&&classId){socket.emit('whiteboard_stroke',{classId,stroke:s});}
  };

  const saveBoard=()=>{
    if(classId){apiFetch('POST',`/live-classes/${classId}/whiteboard`,{strokes:strokes.current},tok()).catch(()=>{});}
  };

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:'#1a1a2e',borderRadius:12,overflow:'hidden'}}>
      {isPresenter&&(
        <div style={{display:'flex',gap:6,padding:'8px 10px',background:'#0d0d1a',flexWrap:'wrap',alignItems:'center'}}>
          {[['pen','✏️','pen'],['marker','🖊️','marker'],['eraser','🧹','eraser']].map(([t,ic,lb])=>(
            <button key={t} type="button" onClick={()=>setTool(t)} style={{background:tool===t?C.g:'rgba(255,255,255,0.1)',border:'none',borderRadius:8,padding:'6px 10px',cursor:'pointer',color:'#fff',fontSize:13,fontWeight:tool===t?700:400}}>{ic}</button>
          ))}
          <input type="color" value={color} onChange={e=>setColor(e.target.value)} style={{width:32,height:32,borderRadius:8,border:'none',cursor:'pointer',background:'none'}} title="Color"/>
          <input type="range" min="1" max="20" value={size} onChange={e=>setSize(Number(e.target.value))} style={{width:70,accentColor:C.g}} title="Size"/>
          <button type="button" onClick={addText} style={{background:'rgba(255,255,255,0.1)',border:'none',borderRadius:8,padding:'6px 10px',cursor:'pointer',color:'#fff',fontSize:13}}>📝 Text</button>
          <button type="button" onClick={clearBoard} style={{background:C.d,border:'none',borderRadius:8,padding:'6px 10px',cursor:'pointer',color:'#fff',fontSize:13}}>🗑️ Clear</button>
          <button type="button" onClick={saveBoard} style={{background:C.g,border:'none',borderRadius:8,padding:'6px 10px',cursor:'pointer',color:'#fff',fontSize:13}}>💾 Save</button>
        </div>
      )}
      <div style={{flex:1,position:'relative'}}>
        <canvas ref={canvasRef} className="wb-canvas"
          style={{width:'100%',height:'100%',cursor:isPresenter?'crosshair':'default',background:'#fff'}}
          onMouseDown={startDraw} onMouseMove={draw} onMouseUp={endDraw} onMouseLeave={endDraw}
          onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={endDraw}/>
        {!isPresenter&&(
          <div style={{position:'absolute',top:8,right:8,background:'rgba(0,0,0,0.5)',color:'#fff',borderRadius:8,padding:'4px 10px',fontSize:11}}>📺 Live Class View</div>
        )}
      </div>
    </div>
  );
}

// ── AI CLASS ROOM ──────────────────────────────────────────────
function AIClassRoom({classData,socket,onEnd}) {
  const {profile}=useAuth(); const {add}=useToast();
  const [messages,setMessages]=useState([]);
  const [input,setInput]=useState('');
  const [aiSpeaking,setAiSpeaking]=useState(false);
  const [speakRate,setSpeakRate]=useState(0.82);
  const [aiTextQueue,setAiTextQueue]=useState([]);
  const [classEnded,setClassEnded]=useState(false);
  const [students,setStudents]=useState([]);
  const [handRaised,setHandRaised]=useState(false);
  const [raisedHands,setRaisedHands]=useState([]);
  const [tab,setTab]=useState('whiteboard'); // whiteboard | chat
  const chatRef=useRef();
  const charKey=classData?.ai_character||'ken';
  const char=AI_CHARS[charKey];
  const isPresenter=profile?.role==='tutor'||profile?.role==='admin';

  const addMsg=(role,text)=>{
    setMessages(p=>[...p,{role,text,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}]);
    setTimeout(()=>{if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight;},100);
  };

  const aiSpeak=(text)=>{
    if(!text)return;
    setAiSpeaking(true);
    addMsg('ai',text);
    // Write key points to board
    const lines=text.split('.').filter(l=>l.trim().length>10).slice(0,2);
    if(lines.length&&classData?.class_type==='whiteboard'){
      setAiTextQueue(p=>[...p,...lines.map(l=>l.trim())]);
    }
    if(socket&&classData?._id){
      socket.emit('ai_speaking',{classId:classData._id,text,character:charKey});
    }
    speak(text,charKey,speakRate,()=>{
      setAiSpeaking(false);
      if(socket&&classData?._id){socket.emit('ai_done_speaking',{classId:classData._id});}
    });
  };

  // ── AUTO-START CLASS ─────────────────────────────────────────
  useEffect(()=>{
    if(!classData)return;
    
    // Get lesson intro from AI if ANTHROPIC_API_KEY configured, else use default
    const startLesson = async () => {
      let intro = classData?.lesson_topic
        ? `Good day class! Today we are going to learn about ${classData.lesson_topic}. Please pay attention and follow along.`
        : `Good day everyone! Welcome to today's lesson. Let us begin.`;
      
      // Try to get AI-generated intro
      try {
        const t = localStorage.getItem('pms_t');
        if (t) {
          const r = await apiFetch('POST', '/ai/lesson-intro', {
            subject: sn(classData.subject_id),
            topic: classData.lesson_topic || '',
            character: classData.ai_character || 'ken',
            lesson_script: classData.lesson_script || ''
          }, t);
          if (r.intro) intro = r.intro;
        }
      } catch(e) { console.log('Using default intro'); }
      
      aiSpeak(intro);
      
      // Auto-read lesson script in chunks after intro
      if(classData?.lesson_script && classData?.presenter_type==='ai'){
        const chunks = classData.lesson_script
          .split(/[.!?\n]/)
          .map(c => c.trim())
          .filter(c => c.length > 10);
        
        let delay = 4000 + intro.split(' ').length * 600;
        chunks.forEach((chunk, i) => {
          setTimeout(()=>{
            if(!classEnded && chunk.trim()){
              aiSpeak(chunk.trim() + '.');
            }
          }, delay);
          // Time per chunk based on word count - natural pace
          delay += Math.max(4000, chunk.split(' ').length * 700);
        });
        
        // End class gracefully after all chunks
        setTimeout(()=>{
          if(!classEnded){
            aiSpeak('That is all for today class. You have done very well. Class is now over. Well done everyone!');
            setTimeout(()=>endClass(), 6000);
          }
        }, delay + 3000);
      }
    };
    
    // Small delay before starting - feels natural
    const timer = setTimeout(startLesson, 1500);
    return () => clearTimeout(timer);
  },[classData?._id]);

  // Listen for socket events
  useEffect(()=>{
    if(!socket)return;
    socket.on('student_joined',({user})=>{
      setStudents(p=>[...p.filter(s=>s._id!==user._id),user]);
      addMsg('system',`${user.name} joined the class.`);
    });
    socket.on('student_left',({userId})=>{
      setStudents(p=>p.filter(s=>s._id!==userId));
    });
    socket.on('class_question',({question,studentName})=>{
      addMsg('student',`${studentName}: ${question}`);
      if(classData?.presenter_type==='ai'){
        handleStudentQuestion(question,studentName);
      }
    });
    socket.on('hand_raise',({userId,name,raised})=>{
      if(raised) setRaisedHands(p=>[...p.filter(h=>h.userId!==userId),{userId,name}]);
      else setRaisedHands(p=>p.filter(h=>h.userId!==userId));
    });
    socket.on('class_status_change',({status})=>{
      if(status==='ended'){setClassEnded(true);stopSpeaking();}
    });
    if(classData?._id){
      socket.emit('join_class',{classId:classData._id,user:{_id:profile?._id,name:profile?.name,role:profile?.role}});
    }
    return()=>{
      socket.off('student_joined');socket.off('student_left');socket.off('class_question');socket.off('hand_raise');socket.off('class_status_change');
      if(classData?._id){socket.emit('leave_class',{classId:classData._id,userId:profile?._id});}
    };
  },[socket,classData?._id]);

  const handleStudentQuestion=async(question,studentName)=>{
    try{
      const d=await apiFetch('POST','/ai/chat',{
        message:`A student named ${studentName} is asking: ${question}`,
        subject:sn(classData?.subject_id),
        character:charKey,
        lesson_context:classData?.lesson_script||'',
        conversation_history:messages.filter(m=>m.role!=='system').slice(-6).map(m=>({role:m.role==='ai'?'assistant':'user',content:m.text}))
      },tok());
      setTimeout(()=>aiSpeak(d.reply),1000);
    }catch(e){
      addMsg('system','[Could not get AI response — check ANTHROPIC_API_KEY on Render]');
    }
  };

  const sendQuestion=async()=>{
    if(!input.trim())return;
    const q=input.trim(); setInput('');
    addMsg('me',q);
    if(socket&&classData?._id){
      socket.emit('class_question',{classId:classData._id,question:q,studentName:profile?.name});
    }
    // If AI class, get response
    if(classData?.presenter_type==='ai'){
      await handleStudentQuestion(q,profile?.name);
    }
  };

  const raiseHand=()=>{
    const newState=!handRaised; setHandRaised(newState);
    if(socket&&classData?._id){
      socket.emit('hand_raise',{classId:classData._id,userId:profile?._id,name:profile?.name,raised:newState});
    }
  };

  const endClass=async()=>{
    stopSpeaking();
    if(isPresenter&&classData?._id){
      try{await apiFetch('PUT',`/live-classes/${classData._id}`,{status:'ended'},tok());}catch(e){}
    }
    setClassEnded(true);
    if(onEnd)onEnd();
  };

  if(classEnded){
    return(
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',padding:30,textAlign:'center',background:'#1a1a2e'}}>

        <button type="button" onClick={onEnd} style={{...BT('p'),marginTop:20}}>← Back to Classes</button>
      </div>
    );
  }

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:'#0d0d1a'}}>
      {/* Header */}
      <div style={{padding:'10px 14px',background:`linear-gradient(135deg,${char.color},#1a1a2e)`,display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
        <div style={{width:40,height:40,borderRadius:'50%',background:'rgba(255,255,255,0.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>{char.avatar}</div>

          <div style={{color:'#fff',fontWeight:700,fontSize:14}}>{char.name} — {classData?.title}</div>
          <div style={{fontSize:11,color:'rgba(255,255,255,0.7)'}}>{sn(classData?.subject_id)} · {students.length} student{students.length!==1?'s':''} online</div>
        </div>
        {aiSpeaking&&<div style={{display:'flex',alignItems:'center',gap:6,background:'rgba(255,255,255,0.1)',borderRadius:20,padding:'4px 12px'}}>
          <div style={{width:8,height:8,borderRadius:'50%',background:'#4ade80',animation:'blink 0.8s ease-in-out infinite'}}/>
          <span style={{color:'#fff',fontSize:11,fontWeight:600}}>Speaking</span>
        </div>}
        {isPresenter&&(
          <button type="button" onClick={endClass} style={{background:C.d,border:'none',borderRadius:9,padding:'7px 14px',cursor:'pointer',color:'#fff',fontSize:13,fontWeight:700}}>⏹ End</button>
        )}
      </div>

      {/* Speed control */}
      {classData?.presenter_type==='ai'&&(
        <div style={{padding:'6px 14px',background:'rgba(255,255,255,0.05)',display:'flex',alignItems:'center',gap:10}}>
          <span style={{color:'rgba(255,255,255,0.7)',fontSize:11}}>Speed:</span>
          {[['Slow',0.65],['Normal',0.82],['Fast',1.0]].map(([l,v])=>(
            <button key={l} type="button" onClick={()=>{setSpeakRate(v);stopSpeaking();}} style={{background:speakRate===v?C.g:'rgba(255,255,255,0.1)',border:'none',borderRadius:6,padding:'4px 10px',cursor:'pointer',color:'#fff',fontSize:11,fontWeight:speakRate===v?700:400}}>{l}</button>
          ))}
          {aiSpeaking&&<button type="button" onClick={stopSpeaking} style={{background:C.d,border:'none',borderRadius:6,padding:'4px 10px',cursor:'pointer',color:'#fff',fontSize:11}}>⏸ Pause</button>}
          <button type="button" onClick={()=>aiSpeak(messages.filter(m=>m.role==='ai').slice(-1)[0]?.text||'Please ask a question to continue the lesson.')} style={{background:'rgba(255,255,255,0.1)',border:'none',borderRadius:6,padding:'4px 10px',cursor:'pointer',color:'#fff',fontSize:11}}>🔄 Repeat</button>
        </div>
      )}

      {/* Tab buttons */}
      <div style={{display:'flex',background:'rgba(255,255,255,0.05)',borderBottom:'1px solid rgba(255,255,255,0.1)',flexShrink:0}}>
        {[['whiteboard','📋 Whiteboard'],['chat','💬 Discussion']].map(([t,l])=>(
          <button key={t} type="button" onClick={()=>setTab(t)} style={{flex:1,padding:'10px 0',border:'none',background:tab===t?'rgba(255,255,255,0.1)':'transparent',color:tab===t?'#fff':'rgba(255,255,255,0.5)',cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:tab===t?700:400,borderBottom:tab===t?`2px solid ${C.gl}`:'2px solid transparent'}}>

                    <div style={{background:m.role==='me'?`linear-gradient(135deg,${C.gd},${C.g})`:m.role==='system'?'rgba(255,255,255,0.05)':'rgba(255,255,255,0.1)',color:'#fff',borderRadius:m.role==='me'?'14px 14px 4px 14px':'14px 14px 14px 4px',padding:'9px 13px',fontSize:13,lineHeight:1.5}}>

// ── SUBSCRIBE PAGE ─────────────────────────────────────────────
function SubscribePage() {
  const {profile}=useAuth(); const {add}=useToast();
  const {data:subs}=useApiData('/subscriptions/mine',[profile?._id]);
  const {data:pays,refetch}=useApiData('/subscriptions/payments/mine',[profile?._id]);
  const [sel,setSel]=useState([]); const [method,setMethod]=useState('mtn'); const [months,setMonths]=useState(1);
  const [busy,setBusy]=useState(false); const [receipt,setReceipt]=useState(null);
  const txnRef=useRef(); const notesRef=useRef();
  const actIds=new Set([...subs.filter(s=>s.payment_status==='approved'&&s.status==='active').map(s=>Number(s.subject_id)),...pays.filter(p=>p.status==='approved').map(p=>Number(p.subject_id))]);
  const pendIds=new Set(pays.filter(p=>p.status==='pending').map(p=>Number(p.subject_id)));
  const toggle=id=>setSel(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const price=85;
  const submit=async()=>{
    const txn=txnRef.current?.value?.trim();
    if(!sel.length||!txn){add({title:'Missing info',body:'Select subjects and enter transaction ID',icon:'⚠️',type:'w'});return;}
    setBusy(true);
    try{
      for(const sid of sel){
        const fd=new FormData(); fd.append('subject_id',sid); fd.append('amount',price*months); fd.append('months',months);
        fd.append('method',method); fd.append('transaction_id',txn);
        const nt=notesRef.current?.value?.trim(); if(nt)fd.append('notes',nt);
        if(receipt)fd.append('receipt',receipt);
        await apiFetch('POST','/subscriptions/payment',null,tok(),fd);
      }
      add({title:'✅ Payment submitted!',body:'Admin will verify shortly. WhatsApp 0772799672 to speed up!',icon:'💳',type:'i'});
      setSel([]); setReceipt(null); refetch();
    }catch(e){add({title:'Error',body:e.message,icon:'❌',type:'d'});}
    finally{setBusy(false);}
  };
  return(
    <div style={{maxWidth:640,paddingBottom:30}}>
      <h2 style={{color:C.gd,marginBottom:4,fontSize:20}}>💳 Subscribe to Subjects</h2>
      <p style={{color:C.gr,fontSize:13,marginBottom:16}}>ZMW 85 per subject per month</p>
      <div style={{...CD,background:C.gp,border:'1px solid #c8e8d8',marginBottom:14}}>
        <h3 style={{color:C.gd,margin:'0 0 10px',fontSize:14}}>💳 Payment Numbers</h3>
        {[{lb:'📱 MTN Mobile Money',num:'0761468402'},{lb:'📱 Airtel Money',num:'0570109056'},{lb:'🏦 Access Bank',num:'0136496126029'},{lb:'💵 Cash',num:'School office'}].map(p=>(
          <div key={p.lb} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid #c8e8d8'}}>
            <span style={{fontSize:13,fontWeight:600,color:C.gd}}>{p.lb}</span>
            <span style={{fontSize:13,fontWeight:700,color:C.g}}>{p.num}</span>
          </div>
        ))}
        <div style={{marginTop:9,fontSize:12,color:C.gd,fontWeight:600}}>Pay first → come back here → submit your transaction ID ↓</div>
      </div>
      {actIds.size>0&&<div style={{...CD,marginBottom:14}}><h3 style={{color:C.gd,margin:'0 0 10px',fontSize:14}}>✅ Active Subscriptions</h3><div style={{display:'flex',flexWrap:'wrap',gap:6}}>{[...actIds].map(id=>{const s=SUBJECTS.find(x=>x.id===id);return s?<span key={id} style={{background:C.okl,color:C.ok,borderRadius:20,padding:'4px 12px',fontSize:12,fontWeight:600}}>{s.i} {s.n}</span>:null;})}</div></div>}
      <div style={CD}>
        <h3 style={{color:C.gd,margin:'0 0 14px',fontSize:14}}>📚 Select Subjects</h3>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(125px,1fr))',gap:8}}>
          {SUBJECTS.map(s=>{const ac=actIds.has(s.id),pn=pendIds.has(s.id),pk=sel.includes(s.id);return(
            <div key={s.id} onClick={()=>!ac&&!pn&&toggle(s.id)} style={{borderRadius:12,padding:'12px 10px',border:`2px solid ${ac?C.ok:pn?C.gold:pk?C.g:C.grl}`,cursor:ac||pn?'not-allowed':'pointer',background:ac?C.okl:pn?C.goldp:pk?C.gp:'#fff',textAlign:'center',transition:'all 0.15s'}}>
              <div style={{fontSize:26,marginBottom:5}}>{s.i}</div>
              <div style={{fontSize:11,fontWeight:700,marginBottom:4,color:C.dk}}>{s.n}</div>
              {ac?<span style={{fontSize:9,color:C.ok,fontWeight:700}}>✓ Active</span>:pn?<span style={{fontSize:9,color:C.gold,fontWeight:700}}>⏳ Pending</span>:pk?<span style={{fontSize:9,color:C.g,fontWeight:700}}>✓ Selected</span>:<span style={{fontSize:9,color:C.gr}}>ZMW {price}/mo</span>}
            </div>

        </div>
      </div>
      {sel.length>0&&(
        <div style={CD}>

function TestsPage({subs,pays}) {
  const {profile}=useAuth(); const {add}=useToast();
  const {data:tests,loading}=useApiData('/tests');
  const {data:questions}=useApiData('/tests/questions');
  const {data:results,refetch}=useApiData('/tests/results',[profile?._id]);
  const [active,setActive]=useState(null); const [answers,setAnswers]=useState({}); const [timeLeft,setTimeLeft]=useState(0); const [done,setDone]=useState(false);
  const timer=useRef(null); const ansRefs=useRef({});
  const start=test=>{setActive(test);setAnswers({});ansRefs.current={};setDone(false);setTimeLeft(test.duration*60);};
  useEffect(()=>{if(!active||done)return;timer.current=setInterval(()=>setTimeLeft(t=>{if(t<=1){clearInterval(timer.current);doSubmit();return 0;}return t-1;}),1000);return()=>clearInterval(timer.current);},[active,done]);
  const doSubmit=async()=>{
    if(!active||done)return; clearInterval(timer.current); setDone(true);
    const fa={...answers}; Object.keys(ansRefs.current).forEach(k=>{if(ansRefs.current[k])fa[k]=ansRefs.current[k].value||'';});
    try{await apiFetch('POST',`/tests/${active._id}/submit`,{answers:fa},tok());refetch();add({title:'✅ Submitted!',icon:'🎯',type:'i'});setTimeout(()=>{setActive(null);setDone(false);},2000);}
    catch(e){add({title:'Error',body:e.message,icon:'⚠️',type:'w'});setTimeout(()=>setActive(null),2000);}
  };
  if(active){
    const qs=questions.filter(q=>q.test_id===active._id);
    const m=Math.floor(timeLeft/60).toString().padStart(2,'0'); const s=(timeLeft%60).toString().padStart(2,'0');
    return(<div style={{maxWidth:640,paddingBottom:30}}>
      <div style={{background:`linear-gradient(135deg,${C.gd},${C.g})`,borderRadius:14,padding:'14px 18px',marginBottom:18,display:'flex',justifyContent:'space-between',alignItems:'center',color:'#fff',position:'sticky',top:0,zIndex:10}}>
        <div><div style={{fontWeight:700,fontSize:15}}>{active.title}</div><div style={{fontSize:11,opacity:.8}}>{qs.length} questions</div></div>
        <div style={{textAlign:'center'}}><div style={{fontSize:26,fontWeight:800,color:timeLeft<60?'#fca5a5':'#fff'}}>{m}:{s}</div><div style={{fontSize:10,opacity:.7}}>Time Left</div></div>
        <button type="button" style={{...BT('d',true),fontSize:12}} onClick={doSubmit} disabled={done}>{done?'⏳':'📤 Submit'}</button>
      </div>
      {qs.map((q,i)=>(
        <div key={q._id} style={CD}>
          <div style={{fontWeight:600,fontSize:14,marginBottom:13,color:C.dk}}>Q{i+1}. {q.question}</div>
          {q.type==='mcq'&&q.options?.map(o=>(
            <label key={o} style={{display:'flex',alignItems:'center',gap:11,padding:'12px 14px',borderRadius:12,marginBottom:8,cursor:'pointer',border:`2px solid ${answers[q._id]===o?C.g:C.grl}`,background:answers[q._id]===o?C.gp:'#fff',transition:'all 0.15s'}}>
              <input type="radio" name={q._id} checked={answers[q._id]===o} onChange={()=>setAnswers(p=>({...p,[q._id]:o}))} style={{accentColor:C.g,width:18,height:18}}/><span style={{fontSize:14}}>{o}</span>
            </label>
          ))}
          {q.type==='truefalse'&&['True','False'].map(o=>(
            <label key={o} style={{display:'flex',alignItems:'center',gap:11,padding:'12px 14px',borderRadius:12,marginBottom:8,cursor:'pointer',border:`2px solid ${answers[q._id]===o.toLowerCase()?C.g:C.grl}`,background:answers[q._id]===o.toLowerCase()?C.gp:'#fff'}}>
              <input type="radio" name={q._id} checked={answers[q._id]===o.toLowerCase()} onChange={()=>setAnswers(p=>({...p,[q._id]:o.toLowerCase()}))} style={{accentColor:C.g,width:18,height:18}}/><span style={{fontSize:14,fontWeight:600}}>{o}</span>
            </label>
          ))}
          {q.type==='short'&&<input ref={el=>ansRefs.current[q._id]=el} style={IN} placeholder="Type your answer..." defaultValue=""/>}
        </div>
      ))}
      <button type="button" style={{...BT(),width:'100%',justifyContent:'center',fontSize:16,padding:'16px'}} onClick={doSubmit} disabled={done}>{done?'⏳ Submitting...':'📤 Submit Test'}</button>
    </div>);
  }
  if(loading)return <Spin/>;
  return(<div style={{paddingBottom:20}}>
    <h2 style={{color:C.gd,marginBottom:14,fontSize:20}}>✏️ Tests & Quizzes</h2>
    {tests.length===0&&<div style={{textAlign:'center',padding:40,color:C.gr}}>No tests yet</div>}
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(250px,1fr))',gap:14}}>
      {tests.map(t=>{
        const qs=questions.filter(q=>q.test_id===t._id);const ok=isSub(subs,pays,t.subject_id);
        const res=results.find?results.find(r=>r.test_id===t._id):null;const pct=res?.percent??null;
        return(<div key={t._id} style={{background:'#fff',borderRadius:16,padding:18,boxShadow:'0 2px 14px rgba(6,77,44,0.08)',border:`2px solid ${res?pct>=70?'#bbf7d0':pct>=50?'#fde68a':'#fecaca':'#eef3f1'}`,position:'relative'}}>
          {res&&<div style={{position:'absolute',top:12,right:12,background:pct>=70?C.okl:pct>=50?C.goldp:C.dl,color:pct>=70?C.ok:pct>=50?C.gold:C.d,borderRadius:10,padding:'6px 12px',fontWeight:800,fontSize:16}}>{pct}%</div>}
          <div style={{fontSize:34,marginBottom:8}}>{si(t.subject_id)}</div>
          <h3 style={{margin:'0 0 5px',color:C.gd,fontSize:14,paddingRight:res?60:0}}>{t.title}</h3>
          <div style={{fontSize:11,color:C.gr,marginBottom:13}}>{sn(t.subject_id)} · {qs.length} Q · {t.duration}min</div>
          {!ok?<span style={{fontSize:12,color:C.d,fontWeight:600}}>🔒 Subscribe to unlock</span>
            :res?<div style={{fontSize:13,color:pct>=50?C.ok:C.d,fontWeight:700}}>{res.score}/{res.total} · {pct>=50?'✅ Passed':'❌ Failed'}</div>
            :<button type="button" style={{...BT('p',true),width:'100%',justifyContent:'center',fontSize:14}} onClick={()=>start(t)}>▶ Start Test</button>}
        </div>);
      })}
    </div>
  </div>);
}

function ScheduleClass() {
  const {add}=useToast();

  const [saving,setSaving]=useState(false);
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));

  const save=async()=>{
    if(!form.title||!form.subject_id){add({title:'Fill required fields',icon:'⚠️',type:'w'});return;}
    setSaving(true);
    try{
      await apiFetch('POST','/live-classes',{...form,subject_id:Number(form.subject_id),auto_start:!!form.auto_start},tok());
      add({title:'✅ Class scheduled!',body:'Students will see it in their Live Classes',icon:'🎥',type:'i'});
      setForm({title:'',subject_id:'',scheduled_date:'',scheduled_time:'',description:'',meet_link:'',presenter_type:'human',ai_character:'ken',class_type:'whiteboard',lesson_topic:'',lesson_script:'',auto_start:false});
    }catch(e){add({title:'Error',body:e.message,icon:'❌',type:'d'});}
    finally{setSaving(false);}

  const charInfo=form.presenter_type==='ai'?AI_CHARS[form.ai_character]:null;

  return(<div style={{maxWidth:680,paddingBottom:30}}>
    <h2 style={{color:C.gd,marginBottom:14,fontSize:20}}>🎥 Schedule a Class</h2>
    <div style={CD}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
        <div><label style={LB}>Subject *</label>

      </div>
      <div style={{marginBottom:14}}><label style={LB}>Class Title *</label><input style={IN} placeholder="e.g. Mathematics — Quadratic Equations" value={form.title} onChange={e=>set('title',e.target.value)}/></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
        <div><label style={LB}>Time</label><input type="time" style={IN} value={form.scheduled_time} onChange={e=>set('scheduled_time',e.target.value)}/></div>
        <div><label style={LB}>Class Type</label>
          <select style={{...IN,appearance:'none'}} value={form.class_type} onChange={e=>set('class_type',e.target.value)}>
            <option value="whiteboard">📋 Whiteboard</option>
            <option value="audio">🎙️ Audio Only</option>
            <option value="video">📹 Video (Human only)</option>
          </select>
        </div>
      </div>

      <div style={{marginBottom:14}}><label style={LB}>Presenter</label>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          {[['human','👨‍🏫 Human Tutor (you)','You present the class live'],['ai','🤖 AI Teacher','AI teaches automatically']].map(([v,l,d])=>(
            <div key={v} onClick={()=>set('presenter_type',v)} style={{borderRadius:12,padding:'12px 14px',border:`2px solid ${form.presenter_type===v?C.g:C.grl}`,cursor:'pointer',background:form.presenter_type===v?C.gp:'#fff',transition:'all 0.15s'}}>
              <div style={{fontSize:14,fontWeight:700,color:form.presenter_type===v?C.g:C.dk}}>{l}</div>
              <div style={{fontSize:11,color:C.gr,marginTop:3}}>{d}</div>
            </div>
          ))}
        </div>
      </div>

      {form.presenter_type==='ai'&&(
        <>
          <div style={{marginBottom:14}}><label style={LB}>AI Teacher Character</label>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              {Object.entries(AI_CHARS).map(([k,ch])=>(
                <div key={k} onClick={()=>set('ai_character',k)} style={{borderRadius:12,padding:'12px 14px',border:`2px solid ${form.ai_character===k?ch.color:C.grl}`,cursor:'pointer',background:form.ai_character===k?`${ch.color}11`:'#fff',transition:'all 0.15s',textAlign:'center'}}>
                  <div style={{fontSize:28}}>{ch.avatar}</div>
                  <div style={{fontWeight:700,fontSize:13,color:ch.color,marginTop:4}}>{ch.name}</div>
                </div>
              ))}
            </div>

          {charInfo&&<div style={{background:`${charInfo.color}11`,border:`1px solid ${charInfo.color}33`,borderRadius:12,padding:'12px 14px',marginBottom:14}}>
            <div style={{fontSize:13,color:charInfo.color,fontWeight:700}}>{charInfo.avatar} {charInfo.name} will teach this class</div>
            <div style={{fontSize:12,color:C.gr,marginTop:3}}>Uses voice, whiteboard, and student Q&A. Students do not know they are learning with AI.</div>
          </div>}
          <div style={{marginBottom:14}}><label style={LB}>📚 Lesson Topic</label><input style={IN} placeholder="e.g. Quadratic Equations and Factorisation" value={form.lesson_topic} onChange={e=>set('lesson_topic',e.target.value)}/></div>
          <div style={{marginBottom:14}}><label style={LB}>📝 Lesson Script (AI will follow this exactly)</label>
            <textarea style={{...IN,height:140,resize:'vertical',fontSize:13}} placeholder={`Write exactly what the AI teacher should say and teach.\n\nExample:\nGood morning class! Today we are going to learn about quadratic equations.\n\nA quadratic equation is an equation of the form ax² + bx + c = 0.\n\nLet us look at our first example...\n\n(AI will read this word by word and write key points on the whiteboard)`} value={form.lesson_script} onChange={e=>set('lesson_script',e.target.value)}/>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14,background:C.goldp,borderRadius:10,padding:'10px 14px'}}>
            <input type="checkbox" id="auto" checked={form.auto_start} onChange={e=>set('auto_start',e.target.checked)} style={{accentColor:C.gold,width:18,height:18}}/>
            <label htmlFor="auto" style={{fontSize:13,fontWeight:600,cursor:'pointer',color:C.gold}}>⏰ Auto-start class at scheduled time (AI begins automatically)</label>
          </div>
        </>
      )}

      {form.presenter_type==='human'&&(
        <div style={{marginBottom:14}}><label style={LB}>📹 Google Meet Link (for video classes)</label><input style={IN} placeholder="https://meet.google.com/xxx-xxx-xxx" value={form.meet_link} onChange={e=>set('meet_link',e.target.value)}/></div>
      )}

      <div style={{marginBottom:16}}><label style={LB}>Description</label><textarea style={{...IN,height:70,resize:'vertical'}} placeholder="Brief description of the class..." value={form.description} onChange={e=>set('description',e.target.value)}/></div>
      <button type="button" style={{...BT(),width:'100%',justifyContent:'center',fontSize:15}} onClick={save} disabled={saving}>{saving?'⏳ Scheduling...':'🎥 Schedule Class'}</button>
    </div>
  </div>);
}

function TutorClasses({socket}) {
  const {profile}=useAuth(); const {add}=useToast();
  const {data:classes,refetch}=useApiData('/live-classes');
  const [activeClass,setActiveClass]=useState(null);
  const mine=classes.filter(c=>c.tutor_id===profile?._id);

  const updateStatus=async(id,status)=>{
    try{await apiFetch('PUT',`/live-classes/${id}`,{status},tok());refetch();add({title:`Class marked ${status}`,icon:'🎥',type:'i'});}
    catch(e){add({title:'Error',body:e.message,icon:'❌',type:'d'});}
  };
  const del=async(id)=>{
    if(!confirm('Delete this class?'))return;
    try{await apiFetch('DELETE',`/live-classes/${id}`,null,tok());refetch();}
    catch(e){add({title:'Error',body:e.message,icon:'❌',type:'d'});}
  };

  if(activeClass){
    return(<div style={{position:'fixed',inset:0,zIndex:200,background:'#0d0d1a'}}>
      <AIClassRoom classData={activeClass} socket={socket} onEnd={()=>{setActiveClass(null);refetch();}}/>
    </div>);
  }

  return(<div style={{paddingBottom:20}}>
    <h2 style={{color:C.gd,marginBottom:14,fontSize:20}}>📺 My Classes</h2>
    {mine.length===0&&<div style={{textAlign:'center',padding:40,color:C.gr}}>No classes scheduled yet. Use "Schedule Class" to create one.</div>}
    {mine.map(cls=>{
      const ch=cls.presenter_type==='ai'?AI_CHARS[cls.ai_character||'ken']:null;
      return(<div key={cls._id} style={{...CD,marginBottom:12,borderLeft:`4px solid ${cls.status==='live'?C.d:cls.status==='upcoming'?C.g:C.gr}`}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:10,flexWrap:'wrap',gap:8}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
              {ch&&<span style={{fontSize:18}}>{ch.avatar}</span>}
              <div style={{fontWeight:700,fontSize:15}}>{cls.title}</div>
            </div>
            <div style={{fontSize:12,color:C.gr}}>{si(cls.subject_id)} {sn(cls.subject_id)} · {cls.scheduled_date} {cls.scheduled_time}</div>
            {ch&&<div style={{fontSize:11,color:ch.color,fontWeight:600,marginTop:2}}>{ch.name} · {cls.class_type}</div>}
          </div>
          <span style={{background:cls.status==='live'?C.dl:cls.status==='upcoming'?C.okl:C.grl,color:cls.status==='live'?C.d:cls.status==='upcoming'?C.ok:C.gr,borderRadius:20,padding:'4px 12px',fontSize:11,fontWeight:600,height:'fit-content'}}>
            {cls.status==='live'?'🔴 LIVE':cls.status==='upcoming'?'📅 Upcoming':'✓ Ended'}
          </span>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {cls.status==='upcoming'&&<button type="button" style={{...BT('p',true),fontSize:12}} onClick={()=>updateStatus(cls._id,'live')}>🔴 Go Live</button>}
          {cls.status==='live'&&(
            cls.presenter_type==='ai'
              ?<button type="button" style={{...BT('p',true),fontSize:12}} onClick={()=>setActiveClass(cls)}>🤖 Open AI Class</button>
              :<button type="button" style={{...BT('p',true),fontSize:12}} onClick={()=>setActiveClass(cls)}>📺 Open Whiteboard</button>
          )}
          {cls.status==='live'&&<button type="button" style={{...BT('d',true),fontSize:12}} onClick={()=>updateStatus(cls._id,'ended')}>⏹ End Class</button>}
          {cls.meet_link&&cls.presenter_type==='human'&&<a href={cls.meet_link} target="_blank" rel="noreferrer" style={{...BT('gh',true),textDecoration:'none',display:'inline-flex',fontSize:12}}>📹 Open Meet</a>}
          <button type="button" style={{...BT('gh',true),fontSize:12}} onClick={()=>del(cls._id)}>🗑️ Delete</button>
        </div>
      </div>);
    })}
  </div>);
}

function AdminPayments({pays}) {
  const {add}=useToast();
  const [lPays,setLPays]=useState(pays);
  const [tab,setTab]=useState('pending');
  const [proc,setProc]=useState(null);
  const noteRef=useRef();
  useEffect(()=>setLPays(pays),[pays]);
  const filtered=lPays.filter(p=>p.status===tab);
  const approve=async id=>{
    setProc(id); const note=noteRef.current?.value?.trim()||'';
    try{await apiFetch('PUT',`/subscriptions/payments/${id}/approve`,{admin_note:note},tok());setLPays(p=>p.map(x=>x._id===id?{...x,status:'approved',admin_note:note}:x));if(noteRef.current)noteRef.current.value='';add({title:'✅ Payment APPROVED!',body:'Subscription activated for student',icon:'💳',type:'i'});}
    catch(e){add({title:'Error',body:e.message,icon:'❌',type:'d'});}
    finally{setProc(null);}
  };
  const reject=async id=>{
    if(!confirm('Reject this payment?'))return; setProc(id); const note=noteRef.current?.value?.trim()||'Could not verify payment';
    try{await apiFetch('PUT',`/subscriptions/payments/${id}/reject`,{admin_note:note},tok());setLPays(p=>p.map(x=>x._id===id?{...x,status:'rejected',admin_note:note}:x));add({title:'Payment rejected',icon:'❌',type:'w'});}
    catch(e){add({title:'Error',body:e.message,icon:'❌',type:'d'});}
    finally{setProc(null);}
  };
  return(<div style={{paddingBottom:20}}>
    <h2 style={{color:C.gd,marginBottom:14,fontSize:20}}>💳 Payments ({lPays.filter(p=>p.status==='pending').length} pending)</h2>
    <div style={{display:'flex',background:'#f3f7f5',borderRadius:12,padding:4,marginBottom:14,gap:4}}>
      {[['pending',`⏳ Pending (${lPays.filter(p=>p.status==='pending').length})`],['approved','✅ Approved'],['rejected','❌ Rejected']].map(([tb,lb])=>(
        <button key={tb} type="button" onClick={()=>setTab(tb)} style={{flex:1,padding:'9px 4px',border:'none',borderRadius:9,cursor:'pointer',fontFamily:'inherit',fontSize:11,fontWeight:700,background:tab===tb?`linear-gradient(135deg,${C.gd},${C.g})`:'transparent',color:tab===tb?'#fff':C.gr}}>{lb}</button>
      ))}
    </div>
    {filtered.length===0?<div style={{textAlign:'center',padding:40,color:C.gr}}>No {tab} payments</div>:
      filtered.map(p=>(
        <div key={p._id} style={{...CD,marginBottom:14,borderLeft:`4px solid ${p.status==='approved'?C.ok:p.status==='rejected'?C.d:C.gold}`}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:10,flexWrap:'wrap',gap:8}}>
            <div>
              <div style={{fontWeight:700,fontSize:16}}>{p.student_id?.name||'Student'}</div>
              <div style={{fontSize:12,color:C.gr}}>{p.student_id?.email}{p.student_id?.phone&&` · 📱 ${p.student_id.phone}`}</div>
              <div style={{fontSize:14,color:C.dk,marginTop:6}}>{si(p.subject_id)} <strong>{sn(p.subject_id)}</strong> · {p.months} mo · <strong style={{color:C.g}}>ZMW {p.amount}</strong></div>
              <div style={{fontSize:12,color:C.gr,marginTop:3}}>{p.method?.toUpperCase()} · Ref: <strong>{p.transaction_id||'None'}</strong> · {fdate(p.createdAt)}</div>
              {p.admin_note&&<div style={{fontSize:12,color:p.status==='rejected'?C.d:C.ok,marginTop:3,fontWeight:600}}>👑 {p.admin_note}</div>}
            </div>
            <span style={{background:p.status==='approved'?C.okl:p.status==='rejected'?C.dl:C.wal,color:p.status==='approved'?C.ok:p.status==='rejected'?C.d:C.wa,borderRadius:20,padding:'4px 12px',fontSize:11,fontWeight:600,height:'fit-content'}}>{p.status}</span>
          </div>
          {p.receipt_url&&<a href={p.receipt_url} target="_blank" rel="noreferrer" style={{display:'inline-flex',alignItems:'center',gap:6,marginBottom:12,background:C.gp,borderRadius:9,padding:'7px 13px',fontSize:13,color:C.g,fontWeight:600,textDecoration:'none'}}>🧾 View Receipt</a>}
          {p.status==='pending'&&(
            <div>
              <div style={{marginBottom:10}}><label style={LB}>Note to Student</label><input ref={noteRef} style={IN} placeholder="e.g. Payment verified ✅"/></div>
              <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                <button type="button" style={{...BT('p'),flex:1,justifyContent:'center',fontSize:14}} onClick={()=>approve(p._id)} disabled={proc===p._id}>{proc===p._id?'⏳ Processing...':'✅ APPROVE'}</button>
                <button type="button" style={{...BT('d',true),fontSize:13}} onClick={()=>reject(p._id)} disabled={proc===p._id}>❌ Reject</button>
              </div>
            </div>
          )}
        </div>
      ))}
  </div>);
}

    {list.map(u=>(
      <div key={u._id} style={{...CD,marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
        <div style={{display:'flex',alignItems:'center',gap:11}}>
          <div style={{width:44,height:44,borderRadius:'50%',background:`linear-gradient(135deg,${u.role==='tutor'?C.gold:C.g},${u.role==='tutor'?'#f0b429':C.gl})`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:18,overflow:'hidden',flexShrink:0}}>
            {u.avatarUrl?<img src={u.avatarUrl} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>:(u.avatar||u.name?.[0]||'?')}
          </div>
          <div>
            <div style={{fontWeight:700,fontSize:14}}>{u.name}</div>
            <div style={{fontSize:11,color:C.gr}}>{u.email}{u.phone&&` · ${u.phone}`}</div>
            <div style={{fontSize:10,color:C.gr}}>{u.province}{u.grade&&` · ${u.grade}`}</div>
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          <span style={{background:u.role==='tutor'?C.goldp:C.okl,color:u.role==='tutor'?C.gold:C.ok,borderRadius:20,padding:'3px 10px',fontSize:11,fontWeight:600,textTransform:'capitalize'}}>{u.role}</span>
          {u.role==='tutor'&&!u.approved&&<button type="button" style={{...BT('p',true),fontSize:12}} onClick={()=>approve(u._id)}>✅ Approve</button>}
          {u.role!=='admin'&&<button type="button" style={{...BT('d',true),fontSize:12}} onClick={()=>del(u._id,u.name)}>🗑️</button>}
        </div>
      </div>
    ))}
  </div>);
}

function AdminAnnounce() {
  const {add}=useToast();
  const {data:anns,setData}=useApiData('/announcements');
  const [imp,setImp]=useState(false); const [saving,setSaving]=useState(false);
  const titleRef=useRef(); const contentRef=useRef();
  const post=async()=>{
    const title=titleRef.current?.value?.trim(); const content=contentRef.current?.value?.trim();
    if(!title||!content){add({title:'Fill all fields',icon:'⚠️',type:'w'});return;}
    setSaving(true);
    try{const d=await apiFetch('POST','/announcements',{title,content,important:imp},tok());setData(p=>[d,...p]);titleRef.current.value='';contentRef.current.value='';setImp(false);add({title:'📢 Posted!',icon:'📢',type:'i'});}
    catch(e){add({title:'Error',body:e.message,icon:'❌',type:'d'});}
    finally{setSaving(false);}
  };
  const del=async id=>{try{await apiFetch('DELETE',`/announcements/${id}`,null,tok());setData(p=>p.filter(a=>a._id!==id));}catch(e){add({title:'Error',body:e.message,icon:'❌',type:'d'});}};
  return(<div style={{maxWidth:680,paddingBottom:20}}>
    <h2 style={{color:C.gd,marginBottom:14,fontSize:20}}>📢 Post Announcement</h2>
    <div style={CD}>
      <div style={{marginBottom:12}}><label style={LB}>Title *</label><input ref={titleRef} style={IN} placeholder="Announcement title..."/></div>
      <div style={{marginBottom:14}}><label style={LB}>Message *</label><textarea ref={contentRef} style={{...IN,height:110,resize:'vertical'}} placeholder="Full announcement..."/></div>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16,background:'#fff3f3',borderRadius:10,padding:'10px 14px'}}>
        <input type="checkbox" id="imp" checked={imp} onChange={e=>setImp(e.target.checked)} style={{accentColor:C.d,width:18,height:18}}/>
        <label htmlFor="imp" style={{fontSize:13,fontWeight:600,cursor:'pointer',color:C.d}}>🔴 Mark as Important</label>
      </div>
      <button type="button" style={{...BT(),width:'100%',justifyContent:'center',fontSize:15}} onClick={post} disabled={saving}>{saving?'⏳ Posting...':'📢 Post Announcement'}</button>
    </div>
    <div style={CD}><h3 style={{color:C.gd,margin:'0 0 14px',fontSize:15}}>All ({anns.length})</h3>
      {anns.map(a=>(
        <div key={a._id} style={{borderLeft:`3px solid ${a.important?C.d:C.g}`,paddingLeft:14,marginBottom:16,paddingBottom:16,borderBottom:'1px solid #f0f4f2'}}>
          <div style={{display:'flex',justifyContent:'space-between',gap:8}}>
            <div style={{fontWeight:700,fontSize:14,color:C.dk}}>{a.important&&'🔴 '}{a.title}</div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <span style={{fontSize:11,color:C.gr}}>{fdate(a.createdAt)}</span>
              <button type="button" onClick={()=>del(a._id)} style={{background:C.dl,color:C.d,border:'none',borderRadius:7,padding:'4px 10px',cursor:'pointer',fontSize:12}}>✕</button>
            </div>
          </div>
          <div style={{fontSize:13,color:C.gr,marginTop:6,lineHeight:1.6}}>{a.content}</div>
        </div>
      ))}
    </div>
  </div>);
}

// ── MAIN APP ───────────────────────────────────────────────────
function AppInner() {
  const {profile,loading}=useAuth();
  if(loading)return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:`linear-gradient(160deg,${C.gd},#085e35,${C.gl})`}}>
      <div style={{width:92,height:92,borderRadius:28,background:`linear-gradient(135deg,#6b4a00,${C.gold},#f0b429)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:44,marginBottom:22,boxShadow:'0 14px 48px rgba(201,147,10,0.5)',animation:'breathe 2s ease-in-out infinite'}}>🎓</div>
      <div style={{color:'#fff',fontSize:20,fontWeight:800,marginBottom:5,fontFamily:"'Playfair Display',serif",letterSpacing:'1px'}}>PEACE MINDSET</div>
      <div style={{color:'rgba(255,255,255,0.7)',fontSize:11,letterSpacing:'2.5px',textTransform:'uppercase',marginBottom:30}}>PRIVATE SCHOOL · GCE ONLINE · ZAMBIA</div>
      <div style={{width:40,height:40,border:'3px solid rgba(255,255,255,0.25)',borderTop:'3px solid #fff',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>
      <div style={{color:'rgba(255,255,255,0.5)',fontSize:12,marginTop:22}}>Connecting to server... </div>
    </div>
  );
  if(!profile)return <AuthScreen/>;
  if(profile.role==='admin')return <AdminApp/>;
  if(profile.role==='tutor'){
    if(!profile.approved)return(
      <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:`linear-gradient(160deg,${C.gd},${C.g})`,padding:16}}>
        <div style={{background:'#fff',borderRadius:24,padding:'44px 32px',textAlign:'center',maxWidth:380,boxShadow:'0 24px 80px rgba(0,0,0,0.3)'}}>
          <div style={{fontSize:68,marginBottom:16}}>⏳</div>
          <h2 style={{color:C.gd,marginBottom:12,fontSize:22}}>Awaiting Admin Approval</h2>
          <p style={{color:C.gr,fontSize:14,lineHeight:1.7}}>Your tutor account is being reviewed. You will be notified once approved.</p>
          <div style={{background:C.gp,borderRadius:14,padding:'16px',marginTop:20}}>
            <p style={{color:C.gd,fontSize:14,margin:0,fontWeight:700}}>📱 WhatsApp admin now:</p>
            <p style={{color:C.g,fontSize:22,margin:'8px 0 0',fontWeight:800}}>0772799672</p>
            <p style={{color:C.gr,fontSize:12,margin:'4px 0 0'}}>Tell them your name and email!</p>
          </div>
        </div>
      </div>
    );
    return <TutorApp/>;
  }
  return <StudentApp/>;
}

function App(){
  return(<AuthProvider><ToastProvider><AppInner/></ToastProvider></AuthProvider>);
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
